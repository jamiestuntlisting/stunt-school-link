<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="screen-orientation" content="landscape">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fire Burn Simulator 🔥</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
    body {
      width: 100%; height: 100%; height: 100dvh;
      margin: 0; padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-canvas {
      display: block;
      flex-shrink: 0;
    }
    #admin-root {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      overflow-y: auto;
    }
    #touch-controls {
      display: none;
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 50;
      pointer-events: none;
    }
    #joystick-zone {
      position: absolute;
      bottom: 20px; right: 20px;
      width: 160px; height: 160px;
      pointer-events: auto;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      border: 2px solid rgba(255,255,255,0.06);
    }
    #joystick-knob {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(255,200,100,0.15);
      border: 2px solid rgba(255,200,100,0.25);
      pointer-events: none;
    }
    #action-btn {
      position: absolute;
      top: 20px; left: 20px;
      width: 70px; height: 70px;
      border-radius: 50%;
      background: rgba(255,100,0,0.2);
      border: 2px solid rgba(255,200,0,0.3);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: bold;
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #mobile-name-input {
      position: absolute;
      top: -100px; left: -100px;
      width: 1px; height: 1px;
      opacity: 0;
      font-size: 16px;
    }
  </style>
  <script>
    // Auth gate: if loaded directly (not in iframe), require login
    if (window.self === window.top) {
      var p = new URLSearchParams(window.location.search);
      var hasId = p.get('id') || localStorage.getItem('stuntschool_userid');
      if (!hasId) {
        window.location.href = '/game-login.html?game=fireburns';
      }
    }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="admin-root"></div>
  <input id="mobile-name-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" maxlength="10">
  <div id="touch-controls">
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="action-btn">LAY<br>DOWN</div>
  </div>
  <script>
    // Respond to parent window requesting the latest score
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'requestScore') {
        var score = typeof window._lastFireScore === 'number' ? window._lastFireScore : 0;
        var urlParams = new URLSearchParams(window.location.search);
        window.parent.postMessage({
          type: 'score',
          game: 'Pro Fire Burner',
          score: score,
          userId: urlParams.get('id') || '',
          firstName: urlParams.get('first_name') || '',
          lastName: urlParams.get('last_name') || ''
        }, '*');
      }
    });
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
