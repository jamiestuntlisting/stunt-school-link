  <line x1="16" y1="19" x2="20" y2="27" stroke="#335588" stroke-width="2" stroke-linecap="round"/>
  <!-- boots -->
  <line x1="12" y1="27" x2="11" y2="29" stroke="#664422" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="27" x2="21" y2="29" stroke="#664422" stroke-width="2" stroke-linecap="round"/>
