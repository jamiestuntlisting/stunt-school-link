// ---- LADDERS (High Falls building) ----
// Player walks onto ladders naturally — no special action needed.
// Building collision is exempt in ladder zones (see isBlocked).
// Walking off the top of a ladder triggers a fall.
const highFallsBuilding = buildings.find(b => b.name === 'HIGH FALLS');
const hfX = highFallsBuilding.x * TILE;
const hfY = highFallsBuilding.y * TILE;
const hfW = highFallsBuilding.w * TILE;
const hfH = highFallsBuilding.h * TILE;

// Each ladder: { worldX, topY, baseY } — matches the drawLadder calls in rendering
const climbableLadders = [
  { worldX: hfX + 6,         topY: hfY - 50,  baseY: hfY + hfH },      // Main tall ladder left
  { worldX: hfX + hfW - 18,  topY: hfY - 20,  baseY: hfY + hfH },      // Shorter right ladder
  { worldX: hfX + hfW/2 - 6, topY: hfY + hfH - 40, baseY: hfY + hfH }, // Small front ladder
];

// Check if the player is currently on a ladder
function getPlayerLadder() {
  const pcx = player.x + player.w/2;
  const pcy = player.y + player.h/2;
  for (const lad of climbableLadders) {
    const ladCenter = lad.worldX + 7;
    if (Math.abs(pcx - ladCenter) <= 8 &&
        pcy >= lad.topY - 5 && pcy <= lad.baseY + 30) {
      return lad;
    }
  }
  return null;
}

// Check if player walked off the top of a ladder — trigger fall
function checkLadderFall() {
  if (ladderFall) return; // already falling
  const pcx = player.x + player.w/2;
  const pcy = player.y + player.h/2;
  for (const lad of climbableLadders) {
    // Player is horizontally on the ladder and went above the top
    const ladCenter = lad.worldX + 7;
    if (Math.abs(pcx - ladCenter) <= 8 &&
        pcy < lad.topY && pcy >= lad.topY - 20) {
      // Walked off the top! Start falling
      ladderFall = {
        x: player.x,
        fallStartY: player.y,
        groundY: hfY - 22, // land just above building roof
        phase: 'falling',
        progress: 0
      };
      // Falling scream sound
      if (!audioCtx) initAudio();
      if (audioCtx) {
        playNote(500, 0, 0.15, 'sine', 0.06);
        playNote(400, 0.1, 0.15, 'sine', 0.06);
        playNote(300, 0.2, 0.2, 'sine', 0.07);
        playNote(200, 0.35, 0.2, 'sine', 0.06);
      }
      return;
    }
  }
}

function updateLadderFall() {
  if (!ladderFall) return false;
  const lf = ladderFall;

  if (lf.phase === 'falling') {
    lf.progress += 0.04;
    const fallDist = lf.groundY - lf.fallStartY;
    const t = Math.min(lf.progress, 1);
    const eased = t * t;
    player.x = lf.x + 16;
    player.y = lf.fallStartY + fallDist * eased;
    player.dir = 0;
    player.moving = false;

    if (t >= 1) {
      lf.phase = 'landed';
      lf.progress = 0;
      player.y = lf.groundY;
      if (!audioCtx) initAudio();
      if (audioCtx) {
        playNote(60, 0, 0.15, 'sine', 0.1);
        playNote(40, 0.05, 0.2, 'sine', 0.08);
      }
    }
  } else if (lf.phase === 'landed') {
    lf.progress++;
    if (lf.progress > 40) {
      player.y = hfY - 22;
      player.x = lf.x + 16;
      ladderFall = null;
      return false;
    }
  }
  return true;
}

function drawLadderFall() {
  if (!ladderFall) return;
  const lf = ladderFall;

  if (lf.phase === 'falling') {
    const t = lf.progress;
    ctx.save();
    ctx.translate(player.x + 10, player.y + 12);
    ctx.rotate(t * Math.PI * 3);
    ctx.fillStyle = '#cc3333';
    ctx.fillRect(-8, -10, 16, 14);
    ctx.fillStyle = '#ffcc99';
    ctx.fillRect(-6, -14, 12, 6);
    ctx.fillStyle = '#3366cc';
    ctx.fillRect(-5, -16, 10, 4);
    ctx.restore();
  } else if (lf.phase === 'landed') {
    ctx.fillStyle = '#ffcc99';
    ctx.fillRect(player.x + 2, player.y + 4, 10, 6);
    ctx.fillStyle = '#cc3333';
    ctx.fillRect(player.x - 2, player.y + 8, 20, 8);
    ctx.fillStyle = '#3366cc';
    ctx.fillRect(player.x, player.y + 2, 8, 4);
    const st = Math.sin(frame * 0.15);
    ctx.fillStyle = '#ffd700';
    ctx.font = '8px monospace';
    ctx.fillText('*', player.x - 4 + st*3, player.y);
    ctx.fillText('*', player.x + 18 - st*3, player.y + 2);
    ctx.fillText('*', player.x + 6, player.y - 4 + st*2);
  }
}

// ---- PROXIMITY ----
function checkProximity() {
  nearBuilding = null;
  nearNPC = null;
  const ep = document.getElementById('enter-prompt');

  // Auto-navigate when walking through the open door
  for (const b of buildings) {
    const bx = b.doorX*TILE, by = b.doorY*TILE;
    const dist = Math.hypot(player.x+10-bx, player.y+12-by);
    if (dist < 28 && !enteringBuilding) {
      // Start walk-into-building animation
      enteringBuilding = true;
      const tagMap = {'STAIR FALLS':'stairfalls','FIRE BURNS':'fireburns','HIGH FALLS':'highfalls','STUNT COORD':'stuntcoord'};
      localStorage.setItem('stuntschool_lastbuilding', tagMap[b.name] || '');
      // Play building transition sound (also kills music)
      playBuildingSound(b.name);
      // Hide all UI immediately
      ep.style.display = 'none';
      document.getElementById('music-btn').style.display = 'none';
      const abtn = document.getElementById('touch-action-btn');
      if (abtn) abtn.style.display = 'none';
      const jArea = document.getElementById('joystick-area');
      if (jArea) jArea.style.display = 'none';
      // Target: just past the door (1.5 tiles into building), not the center
      const targetX = b.doorX * TILE - 10;
      const targetY = b.doorSide === 'bottom'
        ? (b.doorY - 1.5) * TILE  // walk up into building
        : (b.doorY + 1.5) * TILE; // walk down into building
      // Set direction toward building
      if (b.doorSide === 'bottom') player.dir = 3; // face up
      else player.dir = 0; // face down
      enterBuildingAnim = { building: b, timer: 0, targetX, targetY, startX: player.x, startY: player.y, fadeAlpha: 0 };
      return;
    }
    if (dist < 48) {
      nearBuilding = b;
      ep.style.display = 'block';
      ep.textContent = b.name;
      if (isTouchDevice) {
        const ab = document.getElementById('touch-action-btn');
        ab.style.display = 'flex';
        ab.textContent = 'ENTER';
        ab.style.background = 'rgba(232,193,112,0.4)';
        ab.style.borderColor = 'rgba(232,193,112,0.7)';
        ab.style.color = '#e8c170';
      }
      return;
    }
  }
  ep.style.display = 'none';
  nearBuilding = null;

  // Check NPC proximity
  const ab = document.getElementById('touch-action-btn');
  for (const npc of npcs) {
    const dist = Math.hypot(player.x+10-(npc.x+12), player.y+12-(npc.y+14));
    if (dist < 44) {
      nearNPC = npc;
      if (isTouchDevice) {
        ab.style.display = 'flex';
        ab.textContent = 'TALK';
        ab.style.background = 'rgba(126,200,227,0.3)';
        ab.style.borderColor = 'rgba(126,200,227,0.6)';
        ab.style.color = 'rgba(126,200,227,0.9)';
      }
      return;
    }
  }
  // Check stunt school sign proximity
  nearStuntSign = false;
  for (const d of decorations) {
    if (d.type === 'sign') {
      const dist = Math.hypot(player.x+10-(d.x+8), player.y+12-(d.y+12));
      if (dist < 44) {
        nearStuntSign = true;
        if (isTouchDevice) {
          ab.style.display = 'flex';
          ab.textContent = 'READ';
          ab.style.background = 'rgba(240,230,208,0.3)';
          ab.style.borderColor = 'rgba(240,230,208,0.6)';
          ab.style.color = 'rgba(240,230,208,0.9)';
        }
        return;
      }
    }
  }
  // Check high score sign proximity
  nearHighScoreSign = false;
  for (const d of decorations) {
    if (d.type === 'highscore') {
      const dist = Math.hypot(player.x+10-(d.x+8), player.y+12-(d.y+12));
      if (dist < 44) {
        nearHighScoreSign = true;
        if (isTouchDevice) {
          ab.style.display = 'flex';
          ab.textContent = 'READ';
          ab.style.background = 'rgba(255,215,0,0.3)';
          ab.style.borderColor = 'rgba(255,215,0,0.6)';
          ab.style.color = 'rgba(255,215,0,0.9)';
        }
        return;
      }
    }
  }

  // Nothing nearby - hide action button
  if (isTouchDevice) ab.style.display = 'none';
}

// ---- UPDATE ----
function update() {
  if (!gameStarted || dialogueActive || highScoreActive) return;
  // Ladder fall animation
  if (ladderFall) {
    updateLadderFall();
    return;
  }
  // Walk-into-building animation: quick walk in, fast fade, navigate
  if (enteringBuilding && enterBuildingAnim) {
    enterBuildingAnim.timer++;
    const walkFrames = 8; // faster walk
    const fadeFrames = 15; // extra frames for fade after walk
    if (enterBuildingAnim.timer <= walkFrames) {
      // Walk phase: move player toward door/building
      const t = enterBuildingAnim.timer / walkFrames;
      player.x = enterBuildingAnim.startX + (enterBuildingAnim.targetX - enterBuildingAnim.startX) * t;
      player.y = enterBuildingAnim.startY + (enterBuildingAnim.targetY - enterBuildingAnim.startY) * t;
      player.moving = true;
      player.animTimer++;
      if (player.animTimer > 4) { player.animFrame++; player.animTimer = 0; }
      // Fade starts during walk
      enterBuildingAnim.fadeAlpha = t * 0.5;
    } else if (enterBuildingAnim.timer <= walkFrames + fadeFrames) {
      // Fade-to-black phase
      const ft = (enterBuildingAnim.timer - walkFrames) / fadeFrames;
      enterBuildingAnim.fadeAlpha = 0.5 + ft * 0.5;
    } else {
      // Fully black - navigate now (only once)
      enterBuildingAnim.fadeAlpha = 1;
      if (!enterBuildingAnim.navigated) {
        enterBuildingAnim.navigated = true;
        // Load game in iframe instead of navigating away
        const localGameMap = {
          'STAIR FALLS': 'games/stairfalls/index.html',
          'FIRE BURNS': 'games/fireburns/index.html',
          'HIGH FALLS': 'games/highfalls/index.html',
          'STUNT COORD': 'games/stuntcoord/index.html'
        };
        let gameUrl = localGameMap[enterBuildingAnim.building.name] || enterBuildingAnim.building.url;
        if (stuntUser.id) {
          const sep = gameUrl.includes('?') ? '&' : '?';
          gameUrl += sep + 'id=' + encodeURIComponent(stuntUser.id);
        }
        showGameIframe(gameUrl, enterBuildingAnim.building.name);
      }
    }
    return;
  }
  if (enteringBuilding) return;
  // Freeze controls during dramatic part of return anim
  if (returnAnim && returnAnim.timer > 0) {
    const freezeThreshold = returnAnim.type === 'onfire' ? 60 : (returnAnim.type === 'stairfall' ? 30 : 40);
    if (returnAnim.timer > freezeThreshold) return;
  }
  player.moving = false;
  let dx = 0, dy = 0;

  // Keyboard
  if (keys['ArrowLeft']||keys['a']||keys['A']) { dx=-player.speed; player.dir=1; }
  if (keys['ArrowRight']||keys['d']||keys['D']) { dx=player.speed; player.dir=2; }
  if (keys['ArrowUp']||keys['w']||keys['W']) { dy=-player.speed; player.dir=3; }
  if (keys['ArrowDown']||keys['s']||keys['S']) { dy=player.speed; player.dir=0; }

  // Touch joystick (omnidirectional, constant speed)
  if (joystick.active) {
    const deadzone = 0.15;
    const jmag = Math.sqrt(joystick.x*joystick.x + joystick.y*joystick.y);
    if (jmag > deadzone) {
      // Normalize to constant speed regardless of joystick distance
      dx += (joystick.x / jmag) * player.speed;
      dy += (joystick.y / jmag) * player.speed;
      // Set facing direction based on dominant axis
      if (Math.abs(joystick.x) > Math.abs(joystick.y)) {
        player.dir = joystick.x < 0 ? 1 : 2;
      } else {
        player.dir = joystick.y < 0 ? 3 : 0;
      }
    }
  }

  if (dx!==0||dy!==0) player.moving = true;
  // Clamp diagonal speed
  const mag = Math.sqrt(dx*dx+dy*dy);
  if (mag > player.speed) { dx = dx/mag*player.speed; dy = dy/mag*player.speed; }

  // When locked onto a ladder: only allow up/down movement, no horizontal
  if (onLadderLocked) {
    dx = 0; // lock horizontal movement
    if (dy!==0 && !isBlocked(player.x,player.y+dy,player.w,player.h)) player.y+=dy;
    // Keep player snapped to ladder center
    const ladCenter = onLadderLocked.worldX + 7;
    player.x = ladCenter - player.w/2;
    // Check if player walked above the ladder top — fall off
    const pcy = player.y + player.h/2;
    if (pcy < onLadderLocked.topY) {
      // Walked off the top — trigger fall
      ladderFall = {
        x: player.x,
        fallStartY: player.y,
        groundY: hfY - 22,
        phase: 'falling',
        progress: 0
      };
      onLadderLocked = null;
      if (!audioCtx) initAudio();
      if (audioCtx) {
        playNote(500, 0, 0.15, 'sine', 0.06);
        playNote(400, 0.1, 0.15, 'sine', 0.06);
        playNote(300, 0.2, 0.2, 'sine', 0.07);
        playNote(200, 0.35, 0.2, 'sine', 0.06);
      }
    }
    // Exit at bottom only when actively moving downward past the ladder base
    if (onLadderLocked && dy > 0 && pcy > onLadderLocked.baseY + 10) {
      onLadderLocked = null;
    }
  } else {
    if (dx!==0 && !isBlocked(player.x+dx,player.y,player.w,player.h)) player.x+=dx;
    if (dy!==0 && !isBlocked(player.x,player.y+dy,player.w,player.h)) player.y+=dy;
    // Check if player walked onto a ladder from the base (bottom) only — must be walking upward
    if (dy < 0) {
      const lad = getPlayerLadder();
      if (lad) {
        const pcy = player.y + player.h/2;
        const nearBottom = pcy >= hfY + hfH - 50 && pcy <= hfY + hfH + 35;
        if (nearBottom) {
          onLadderLocked = lad;
          player.x = lad.worldX + 7 - player.w/2; // snap to ladder
        }
      }
    }
  }

  if (player.moving) {
    player.animTimer++;
    if (player.animTimer>6) { player.animFrame++; player.animTimer=0; }
  }
  checkProximity();
}

// ---- DRAW ----
const ZOOM = 1.6;
function draw() {
  ctx.clearRect(0,0,W,H);

  // Camera follows player, clamped to map edges
  const camX = Math.max(0, Math.min(player.x + 10 - W/(2*ZOOM), MAP_W*TILE - W/ZOOM));
  const camY = Math.max(0, Math.min(player.y + 12 - H/(2*ZOOM), MAP_H*TILE - H/ZOOM));

  ctx.save();
  ctx.scale(ZOOM, ZOOM);
  ctx.translate(-camX, -camY);

  for (let y=0;y<MAP_H;y++) for (let x=0;x<MAP_W;x++) drawTile(x,y);
  decorations.forEach(d => drawDecoration(d));

  const entities = [];
  buildings.forEach(b => entities.push({type:'building',data:b,y:(b.y+b.h)*TILE}));
  npcs.forEach(n => entities.push({type:'npc',data:n,y:n.y+28}));
  // When on a ladder or falling, draw player on top of everything
  const onLadder = onLadderLocked !== null || ladderFall;
  entities.push({type:'player',data:player,y: onLadder ? 99999 : player.y+24});
  entities.sort((a,b) => a.y-b.y);

  entities.forEach(e => {
    switch(e.type) {
      case 'building': drawBuilding(e.data); break;
      case 'npc': drawNPC(e.data); break;
      case 'player':
        if (ladderFall) {
          drawLadderFall();
        } else {
          drawPlayer();
        }
        break;
    }
  });

  ctx.restore();

  // Vignette (drawn in screen space)
  const g = ctx.createRadialGradient(W/2,H/2,W*0.35,W/2,H/2,W*0.75);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // Fade to black when entering a building
  if (enterBuildingAnim && enterBuildingAnim.fadeAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${Math.min(enterBuildingAnim.fadeAlpha, 1)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ---- IFRAME GAME OVERLAY ----
let activeGameBuilding = null; // name of building currently showing iframe

function showGameIframe(url, buildingName) {
  activeGameBuilding = buildingName;
  const overlay = document.getElementById('game-iframe-overlay');
  const iframe = document.getElementById('game-iframe');
  iframe.src = url;
  overlay.style.display = 'block';
  // Pause overworld
  stopMusic();
  // Analytics: track game start
  if (typeof _trackGameStart === 'function') _trackGameStart(buildingName);
}

function hideGameIframe() {
  const overlay = document.getElementById('game-iframe-overlay');
  const iframe = document.getElementById('game-iframe');
  // Ask the game to send its score before we unload it
  try { iframe.contentWindow.postMessage({ type: 'requestScore' }, '*'); } catch(e) {}
  // Small delay to let the score message arrive, then unload
  setTimeout(() => { try { iframe.src = 'about:blank'; } catch(e) {} }, 200);
  overlay.style.display = 'none';

  // Reset building entry state
  if (enterBuildingAnim && enterBuildingAnim.building) {
    const b = enterBuildingAnim.building;
    if (b.doorSide === 'bottom') {
      player.x = b.doorX * TILE - 10;
      player.y = (b.doorY + 1) * TILE;
      player.dir = 0;
    } else {
      player.x = b.doorX * TILE - 10;
      player.y = (b.doorY - 1.5) * TILE;
      player.dir = 3;
    }
  }
  enteringBuilding = false;
  enterBuildingAnim = null;

  // Trigger return animation based on which building
  const tagMap = {'STAIR FALLS':'stairfalls','FIRE BURNS':'fireburns','HIGH FALLS':'highfalls','STUNT COORD':'stuntcoord'};
  const tag = tagMap[activeGameBuilding];
  if (tag === 'stairfalls') returnAnim = { type: 'stairfall', timer: 120 };
  else if (tag === 'fireburns') { returnAnim = { type: 'onfire', timer: 300 }; }
  else if (tag === 'highfalls') returnAnim = { type: 'hardfall', timer: 80 };
  else if (tag === 'stuntcoord') { returnAnim = { type: 'cool', timer: 60 }; hasSunglasses = true; }

  // Analytics: track game end
  if (typeof _trackGameEnd === 'function') _trackGameEnd(activeGameBuilding);
  activeGameBuilding = null;

  // Show UI again
  document.getElementById('music-btn').style.display = 'block';
  const jArea = document.getElementById('joystick-area');
  if (jArea && isTouchDevice) jArea.style.display = 'block';

  // Restart music
  playMusic();
}

document.getElementById('back-to-school-btn').addEventListener('click', hideGameIframe);

// Listen for score messages from iframe games
window.addEventListener('message', function(e) {
  if (e.data && (e.data.type === 'score' || e.data.type === 'game-score')) {
    const d = e.data;
    // Map game names to our high score keys
    const gameKeyMap = {
      'Pro Stair Faller': 'stairfalls',
      'Pro Fire Burner': 'fireburns',
      'Pro High Faller': 'highfalls',
      'Coordinator Please': 'stuntcoord'
    };
    const gameKey = gameKeyMap[d.game] || d.game;
    const playerName = (d.firstName && d.lastName)
      ? d.firstName + ' ' + d.lastName
      : stuntUser.firstName && stuntUser.lastName
        ? stuntUser.firstName + ' ' + stuntUser.lastName
        : 'Anonymous';
    const userId = d.userId || stuntUser.id || '';
    const scoreVal = d.score || 0;
    const reputationVal = d.reputation || d.score || 0;
    const moneyVal = d.money || d.earnings || 0;

    // Save to localStorage high score board immediately
    const lsKey = gameKey + '_highscores';
    try {
      const existing = JSON.parse(localStorage.getItem(lsKey) || '[]');
      existing.push({ name: playerName, score: scoreVal, reputation: reputationVal, money: moneyVal, userId: userId, date: new Date().toISOString().slice(0,10) });
      existing.sort((a,b) => b.score - a.score);
      localStorage.setItem(lsKey, JSON.stringify(existing.slice(0, 10)));
      // Update the in-memory cache too
      hsCache[gameKey] = existing.slice(0, 10);
    } catch(err) { console.warn('Local score save failed:', err); }

    // Also try API
    if (userId) {
      fetch(HS_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          game: gameKey,
          userId: userId,
          firstName: d.firstName || stuntUser.firstName || '',
          lastName: d.lastName || stuntUser.lastName || '',
          name: playerName,
          score: scoreVal,
          reputation: reputationVal,
          money: moneyVal
        })
      }).catch(err => console.warn('Score submit failed:', err));
    }

    // Analytics: store latest score for game tracking
    if (typeof _trackGameScore === 'function') _trackGameScore(gameKey, scoreVal, d.level || 0);

    console.log('Score received from ' + d.game + ': score=' + scoreVal + ' reputation=' + reputationVal + ' money=$' + moneyVal + ' by ' + playerName);
  }
});

let gameLoopId = null;
let lastFrameTime = 0;
const TARGET_FRAME_MS = 1000 / 60; // cap at 60fps
let frameAccumulator = 0;

function gameLoop(timestamp) {
  if (!lastFrameTime) lastFrameTime = timestamp;
  const elapsed = timestamp - lastFrameTime;
  lastFrameTime = timestamp;
  frameAccumulator += elapsed;

  // Only update at ~60fps, even on 120Hz+ displays
  if (frameAccumulator >= TARGET_FRAME_MS) {
    frame++;
    update();
    frameAccumulator -= TARGET_FRAME_MS;
    // Prevent spiral of death if tab was backgrounded
    if (frameAccumulator > TARGET_FRAME_MS * 4) frameAccumulator = 0;
  }
  draw();
  gameLoopId = requestAnimationFrame(gameLoop);
}

gameLoopId = requestAnimationFrame(gameLoop);

// ---- ANALYTICS TRACKING ----
const ANALYTICS_API = 'https://stunt-scores.vercel.app/api/analytics';
const _sessionId = (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2));
const _sessionStart = new Date().toISOString();
const _sessionNPCs = {};     // { npcName: count }
const _sessionGames = [];    // [{ game, startedAt, endedAt, durationSec, score, highestLevel }]
let _currentGameSession = null;
let _latestGameScore = {};   // { gameKey: { score, level } }

const _deviceInfo = {
  userAgent: navigator.userAgent,
  mobile: isTouchDevice,
  screenW: screen.width,
  screenH: screen.height,
};

function _trackNPC(npcName) {
  _sessionNPCs[npcName] = (_sessionNPCs[npcName] || 0) + 1;
}

function _trackGameStart(buildingName) {
  const tagMap = {'STAIR FALLS':'stairfalls','FIRE BURNS':'fireburns','HIGH FALLS':'highfalls','STUNT COORD':'stuntcoord'};
  _currentGameSession = {
    game: tagMap[buildingName] || buildingName,
    startedAt: new Date().toISOString(),
  };
}

function _trackGameScore(gameKey, score, level) {
  _latestGameScore[gameKey] = { score, level };
}

function _trackGameEnd(buildingName) {
  if (!_currentGameSession) return;
  const now = new Date();
  const start = new Date(_currentGameSession.startedAt);
  const durationSec = Math.round((now - start) / 1000);
  const gameKey = _currentGameSession.game;
  const scoreData = _latestGameScore[gameKey] || {};
  _sessionGames.push({
    game: gameKey,
    startedAt: _currentGameSession.startedAt,
    endedAt: now.toISOString(),
    durationSec,
    score: scoreData.score || 0,
    highestLevel: scoreData.level || 0,
  });
  _currentGameSession = null;
  delete _latestGameScore[gameKey];
}

function _buildHeartbeat() {
  return {
    action: 'heartbeat',
    userId: stuntUser.id || 'anonymous',
    sessionId: _sessionId,
    startedAt: _sessionStart,
    device: _deviceInfo,
    games: _sessionGames,
    npcs: _sessionNPCs,
  };
}

function _sendHeartbeat() {
  const payload = _buildHeartbeat();
  fetch(ANALYTICS_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).catch(() => {});
}

function _sendBeaconHeartbeat() {
  const payload = _buildHeartbeat();
  try {
    navigator.sendBeacon(ANALYTICS_API, new Blob([JSON.stringify(payload)], { type: 'application/json' }));
  } catch (e) {
    // Fallback
    fetch(ANALYTICS_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), keepalive: true }).catch(() => {});
  }
}

// Register user (called after user lookup completes so name is available)
function _registerUser() {
  if (!stuntUser.id) return;
  fetch(ANALYTICS_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'register',
      userId: stuntUser.id,
      firstName: stuntUser.firstName,
      lastName: stuntUser.lastName,
      device: _deviceInfo,
    }),
  }).catch(() => {});
}
// If returning (name already in localStorage), register immediately
if (isReturning && stuntUser.id && stuntUser.firstName) {
  _registerUser();
}

// Heartbeat every 30 seconds
setInterval(_sendHeartbeat, 30000);

// Send heartbeat on page unload
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') _sendBeaconHeartbeat();
});
window.addEventListener('beforeunload', _sendBeaconHeartbeat);
window.addEventListener('pagehide', _sendBeaconHeartbeat);

// ---- STARTUP (after all declarations) ----
if (isReturning) {
  // Returning from a game iframe — skip welcome and title, go straight to overworld
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'none';
  startGame();
}
// Otherwise the welcome screen handles entry via enterStuntSchool()
