<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Virtual Stunt School</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #111;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: monospace;
  image-rendering: pixelated;
  -webkit-touch-callout: none;
}
#game-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 9/16;
  max-height: 100dvh;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  image-rendering: pixelated;
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 4px;
}
#ui-overlay {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 10;
  width: 90%;
}
#dialogue-box {
  display: none;
  background: rgba(0,0,20,0.94);
  border: 3px solid #e8c170;
  border-radius: 8px;
  padding: 14px 16px;
  color: #f0e6d0;
  font-size: 14px;

  text-align: left;
  box-shadow: 0 0 20px rgba(0,0,0,0.7);
}
#dialogue-box .npc-name {
  color: #e8c170; font-weight: bold; margin-bottom: 4px; font-size: 13px;
}
#dialogue-box .dialogue-text { color: #f0e6d0; white-space: pre-line; }
#dialogue-box .prompt { color: #888; font-size: 11px; margin-top: 6px; }
#highscore-box {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,10,1);
  z-index: 200;
  color: #f0e6d0;
  font-size: 14px;
  line-height: 1.5;
  text-align: left;
  overflow: hidden;
}
#highscore-box .hs-inner {
  max-width: 420px;
  margin: 0 auto;
  padding: 16px 16px 12px;
  height: 100%;
  display: flex;
  flex-direction: column;
}
#highscore-box .hs-header {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  margin-bottom: 10px;
}
#highscore-box .hs-title {
  color: #ffd700; font-weight: bold; font-size: 20px; text-align: center;
  text-shadow: 0 0 12px rgba(255,215,0,0.4);
}
#highscore-box .hs-close {
  position: absolute; right: 0; top: -2px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,215,0,0.4);
  border-radius: 4px; color: #ffd700; font-size: 13px; font-family: monospace;
  padding: 4px 10px; cursor: pointer;
}
#highscore-box .hs-close:active { background: rgba(255,215,0,0.2); }
.hs-tabs {
  display: flex; gap: 4px; margin-bottom: 12px;
}
.hs-tab {
  background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.25);
  border-bottom: none;
  border-radius: 6px 6px 0 0; padding: 8px 4px; color: #777;
  font-size: 10px; font-family: monospace; cursor: pointer; text-align: center;
  flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s;
}
.hs-tab:active { background: rgba(255,215,0,0.2); }

  background: rgba(255,215,0,0.22); border-color: #ffd700;

}
#highscore-box .hs-game-header {
  color: #e8c170; font-weight: bold; font-size: 16px; margin-bottom: 8px; text-align: center;
  border-bottom: 1px solid rgba(255,215,0,0.15); padding-bottom: 6px;
}
#hs-panels {
  flex: 1; overflow-y: auto; min-height: 0;
}
#highscore-box .hs-scores { color: #ccc; font-size: 13px; }
#highscore-box .hs-scores .hs-row {
  display: flex; align-items: center; padding: 6px 8px; border-radius: 4px; margin-bottom: 2px;
}
#highscore-box .hs-scores .hs-row:nth-child(odd) { background: rgba(255,255,255,0.03); }
#highscore-box .hs-scores .hs-rank { color: #888; width: 28px; flex-shrink: 0; font-size: 12px; }
#highscore-box .hs-scores .hs-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
#highscore-box .hs-scores .hs-val { color: #ffd700; text-align: right; flex-shrink: 0; min-width: 60px; font-weight: bold; }
#highscore-box .hs-scores .hs-row:first-child { background: rgba(255,215,0,0.1); }
#highscore-box .hs-scores .hs-row:first-child .hs-rank { color: #ffd700; }
#highscore-box .hs-scores .hs-row:first-child .hs-name { color: #ffd700; }
#highscore-box .hs-scores .hs-row:nth-child(2) .hs-name { color: #c0c0c0; }
#highscore-box .hs-scores .hs-row:nth-child(3) .hs-name { color: #cd7f32; }
#highscore-box .hs-scores .hs-row.hs-you { background: rgba(126,200,227,0.12); border: 1px solid rgba(126,200,227,0.3); }
#highscore-box .hs-scores .hs-row.hs-you .hs-name { color: #7ec8e3; }
#highscore-box .hs-scores .hs-row.hs-you .hs-rank { color: #7ec8e3; }
#highscore-box .hs-empty { color: #666; font-style: italic; font-size: 13px; text-align: center; padding: 20px 0; }
#highscore-box .hs-footer { color: #555; font-size: 10px; text-align: center; padding-top: 8px; flex-shrink: 0; }
#enter-prompt {
  display: none;
  background: rgba(0,0,20,0.88);
  border: 2px solid #7ec8e3;
  border-radius: 6px;
  padding: 8px 14px;
  color: #7ec8e3;
  font-size: 13px;
  text-align: center;
  margin-top: 6px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
#welcome-screen {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: #1a1a1a;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 150;
  font-family: monospace;
  padding: 20px;
  touch-action: auto;
  -webkit-user-select: auto;
  user-select: auto;
}
#welcome-screen .welcome-title {
  font-size: 28px; color: #e8c170;

}
#welcome-screen .welcome-greeting {
  font-size: 20px; color: #7ec8e3; margin-bottom: 30px; text-align: center;
}

}
#welcome-screen .welcome-btn {

}
#welcome-screen .welcome-btn:active { background: rgba(232,193,112,0.35); }
#welcome-screen .not-you-btn {

}
#welcome-screen .not-you-btn:active { color: #aaa; border-color: #888; }
#login-form {
  display: none; flex-direction: column; align-items: center;

}
#login-form .login-label {

}

  border: 2px solid #555; border-radius: 6px;

}
#login-form input:focus { border-color: #e8c170; }
#login-form input::placeholder { color: #555; }
#login-form .login-btn {
  font-family: monospace; font-size: 16px; font-weight: bold;
  padding: 12px 32px; border-radius: 6px; cursor: pointer;
  border: 2px solid #e8c170; background: rgba(232,193,112,0.15);
  color: #e8c170; width: 100%; margin-top: 4px;
  transition: all 0.2s;
}
#login-form .login-btn:active { background: rgba(232,193,112,0.35); }
#login-form .login-error {
  color: #ff6b6b; font-size: 12px; margin-bottom: 8px; display: none; text-align: center;
}
#login-form .login-or {
  color: #555; font-size: 12px; margin: 14px 0 10px;
}
#login-form .guest-btn {
  font-family: monospace; font-size: 13px;
  padding: 8px 20px; border-radius: 6px; cursor: pointer;
  border: 1px solid #555; background: transparent;
  color: #888; width: 100%;
  transition: all 0.2s;
}
#login-form .guest-btn:active { color: #aaa; border-color: #888; }
#title-screen {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: #1a1a1a;

#title-screen h1 {

}
@keyframes textIn { from { opacity: 0; } to { opacity: 1; } }
#music-btn {
  position: absolute; top: 8px; right: 8px; z-index: 50;
  background: rgba(0,0,20,0.8); border: 2px solid #e8c170;
  color: #e8c170; font-family: monospace; font-size: 12px;

}
/* Joystick (right side) */
#joystick-area {

}

  width: 120px; height: 120px;
  border-radius: 50%;
}
/* Action button (left side) */
#touch-action-btn {
  position: absolute;
  bottom: 40px; left: 20px;

  border: 2px solid rgba(126,200,227,0.6);
  border-radius: 50%;
  color: rgba(126,200,227,0.9);
  font-family: monospace; font-size: 12px; font-weight: bold;
  z-index: 30;
  display: none;
  align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  cursor: pointer;
}

<body>

<div id="welcome-screen">
  <div class="welcome-title">StuntListing's<br>Virtual Stunt School</div>
  <div class="welcome-loading" id="welcome-loading">Loading...</div>
  <div class="welcome-greeting" id="welcome-greeting" style="display:none;"></div>
  <button class="welcome-btn" id="welcome-enter-btn" style="display:none;">Enroll Now</button>
  <button class="not-you-btn" id="welcome-notyou-btn" style="display:none;">Not You?</button>
  <div id="login-form" style="display:none;">
    <div class="login-label">Log in with your StuntListing account to play as yourself (and maybe win a prize)</div>
    <div class="login-error" id="login-error"></div>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" id="login-btn">Log In</button>
    <div class="login-or">- or -</div>
    <button class="guest-btn" id="guest-btn">Continue as Guest</button>
    <div id="guest-name-form" style="display:none; margin-top:14px; text-align:center;">
      <div class="login-label">Enter your player name:</div>

  </div>
</div>


<div id="title-screen" style="display:none;">
  <h1>StuntListing's<br>Virtual Stunt School</h1>
  <h2>A Stunt Person's Journey</h2>
</div>

<div id="game-wrapper">
  <canvas id="game"></canvas>
  <div id="ui-overlay">
    <div id="dialogue-box">
      <div class="npc-name" id="npc-name"></div>
      <div class="dialogue-text" id="dialogue-text"></div>
      <div class="prompt" id="dialogue-prompt"></div>
    </div>
    <div id="enter-prompt"></div>
  </div>
  <div id="highscore-box">
    <div class="hs-inner">
      <div class="hs-header">
        <div class="hs-title">HIGH SCORES</div>
        <div class="hs-close" id="hs-close">CLOSE</div>
      </div>
      <div class="hs-tabs" id="hs-tabs"></div>
      <div id="hs-panels"></div>
      <div class="hs-footer" id="hs-footer"></div>
    </div>
  </div>
  <button id="music-btn" style="display:none;">Music: ON</button>
  <div id="joystick-area"><canvas id="joystick-canvas" width="120" height="120"></canvas></div>
  <div id="touch-action-btn">ACT</div>
</div>

<!-- Game iframe overlay (hidden until entering a building) -->
<div id="game-iframe-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; background:#000;">
  <iframe id="game-iframe" style="width:100%; height:100%; border:none;" sandbox="allow-scripts allow-same-origin allow-popups" allow="autoplay"></iframe>
  <button id="back-to-school-btn" style="
    position:fixed; top:50px; left:10px; z-index:10001;
    padding:4px 8px; font-size:11px; font-weight:bold;
    background:rgba(0,0,0,0.7); color:#e8c170; border:2px solid #e8c170;
    border-radius:6px; cursor:pointer; font-family:monospace;
    touch-action:manipulation;
  ">&#8592; Back to School</button>
</div>

<script>
// ============================================================
// STUNT SCHOOL - A Top-Down Zelda-like Adventure
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- USER IDENTITY (id from URL, name from MySQL via API) ----
const urlParams = new URLSearchParams(window.location.search);
const stuntUser = {
  id: (urlParams.get('id') || localStorage.getItem('stuntschool_userid') || '').replace(/[^0-9]/g, ''),
  firstName: localStorage.getItem('stuntschool_firstname') || '',
  lastName: localStorage.getItem('stuntschool_lastname') || ''
};

// Welcome screen logic
const USER_LOOKUP_API = 'https://stunt-scores.vercel.app/api/user-lookup';
const LOGIN_API = 'https://stunt-scores.vercel.app/api/login';
const welcomeScreen = document.getElementById('welcome-screen');
const welcomeLoading = document.getElementById('welcome-loading');
const welcomeGreeting = document.getElementById('welcome-greeting');
const welcomeEnterBtn = document.getElementById('welcome-enter-btn');
const welcomeNotYouBtn = document.getElementById('welcome-notyou-btn');
const loginForm = document.getElementById('login-form');
const loginError = document.getElementById('login-error');
const loginBtn = document.getElementById('login-btn');
const guestBtn = document.getElementById('guest-btn');

function setUser(id, firstName, lastName) {
  stuntUser.id = String(id);
  stuntUser.firstName = firstName;
  stuntUser.lastName = lastName;
  localStorage.setItem('stuntschool_userid', stuntUser.id);
  localStorage.setItem('stuntschool_firstname', stuntUser.firstName);
  localStorage.setItem('stuntschool_lastname', stuntUser.lastName);
  localStorage.setItem('stuntschool_playername', stuntUser.firstName + ' ' + stuntUser.lastName);
}

function showWelcomeUser(firstName) {
  welcomeLoading.style.display = 'none';
  loginForm.style.display = 'none';
  welcomeGreeting.textContent = 'Welcome, ' + firstName + '!';
  welcomeGreeting.style.display = 'block';
  welcomeEnterBtn.style.display = 'inline-block';
  welcomeNotYouBtn.style.display = 'inline-block';
}

function showLoginForm() {
  welcomeLoading.style.display = 'none';
  welcomeGreeting.style.display = 'none';
  welcomeEnterBtn.style.display = 'none';
  welcomeNotYouBtn.style.display = 'none';
  loginForm.style.display = 'flex';
}

function enterStuntSchool() {
  welcomeScreen.style.display = 'none';
  // Show title splash briefly then start game
  const titleScreen = document.getElementById('title-screen');
  titleScreen.style.display = 'flex';
  setTimeout(startGame, 5200);
  // Register user with analytics (name is resolved by this point)
  if (typeof _registerUser === 'function') _registerUser();
}

welcomeEnterBtn.addEventListener('click', enterStuntSchool);

// "Not You?" — show login form
welcomeNotYouBtn.addEventListener('click', function() {
  showLoginForm();
});

// Login button
loginBtn.addEventListener('click', function() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) {
    loginError.textContent = 'Please enter email and password';
    loginError.style.display = 'block';
    return;
  }
  loginBtn.textContent = 'Logging in...';
  loginBtn.disabled = true;
  loginError.style.display = 'none';

  fetch(LOGIN_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  })
    .then(r => r.json())
    .then(data => {
      loginBtn.textContent = 'Log In';
      loginBtn.disabled = false;
      if (data.success) {
        setUser(data.id, data.first_name, data.last_name);
        showWelcomeUser(data.first_name);
      } else {
        loginError.textContent = data.message || 'Login failed';
        loginError.style.display = 'block';
      }
    })
    .catch(() => {
      loginBtn.textContent = 'Log In';
      loginBtn.disabled = false;
      loginError.textContent = 'Connection error. Try again.';
      loginError.style.display = 'block';
    });
});

// Allow Enter key to submit login
document.getElementById('login-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loginBtn.click();
});

// Continue as Guest — show name input
guestBtn.addEventListener('click', function() {
  guestBtn.style.display = 'none';
  document.getElementById('guest-name-form').style.display = 'block';
  document.getElementById('guest-name-input').focus();
});

document.getElementById('guest-go-btn').addEventListener('click', function() {
  const name = document.getElementById('guest-name-input').value.trim();
  if (!name) {
    document.getElementById('guest-name-input').style.borderColor = '#ff6b6b';
    return;
  }
  const guestId = String(100000 + Math.floor(Math.random() * 900000));
  setUser(guestId, name, '');
  enterStuntSchool();
});

document.getElementById('guest-name-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('guest-go-btn').click();
});

// Initial flow: check URL id or show login
if (stuntUser.id) {
  // We have an ID — look up the name from MySQL
  welcomeLoading.textContent = 'Looking up your profile...';
  fetch(USER_LOOKUP_API + '?id=' + encodeURIComponent(stuntUser.id))
    .then(r => r.json())
    .then(data => {
      if (data.found && data.first_name) {
        setUser(data.id, data.first_name, data.last_name || '');
        showWelcomeUser(data.first_name);
      } else {
        // ID not found — show login form
        showLoginForm();
      }
    })
    .catch(() => {
      // API error — try localStorage fallback
      if (stuntUser.firstName) {
        showWelcomeUser(stuntUser.firstName);
      } else {
        showLoginForm();
      }
    });
} else {
  // No ID — show login form
  showLoginForm();
}

// Vertical phone aspect ratio: 9:16
const W = 360, H = 640;
canvas.width = W;
canvas.height = H;
const TILE = 32;

// Detect touch device
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// ---- MUSIC ENGINE (Web Audio chiptune) ----
let audioCtx = null;
let musicPlaying = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playNote(freq, start, dur, type='triangle', vol=0.06) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + start);
  osc.stop(audioCtx.currentTime + start + dur);
}

let _musicLoopTimer = null;
function playMusic() {
  // Prevent double-play: if already playing, do nothing
  if (musicPlaying) return;
  if (!audioCtx) initAudio();
  musicPlaying = true;
  document.getElementById('music-btn').textContent = 'Music: ON';

  // Epic dramatic stunt school anthem — ~36 seconds before looping
  const BPM = 118;
  const beat = 60 / BPM;
  const b = beat; // shorthand

  // E minor key: E=165/330, F#=185, G=196/392, A=220/440, B=247/494, C=262/523, D=294/587
  // Low octave: E=82, G=98, A=110, B=124, C=131, D=147

  // 8 sections of 4 bars each = 32 bars = 128 beats ≈ 65 seconds
  // We'll do 5 sections (20 bars, 80 beats) ≈ 40 seconds

  const lead = [];
  const bass = [];
  const chords = [];
  let t = 0;

  // === SECTION 1: Ominous intro (bars 1-4, 16 beats) ===
  // Sparse, low, mysterious — sets the mood
  lead.push([165,t,b*1.5],[0,0,0]); // E3 long
  lead.push([196,t+b*2,b*1],[185,t+b*3.5,b*0.5]);
  lead.push([165,t+b*4,b*2]);
  lead.push([147,t+b*6,b*1],[131,t+b*7,b*0.5],[147,t+b*7.5,b*0.5]);
  lead.push([165,t+b*8,b*1.5],[196,t+b*10,b*1]);
  lead.push([220,t+b*11,b*0.5],[196,t+b*11.5,b*0.5],[165,t+b*12,b*2]);
  lead.push([147,t+b*14,b*1],[165,t+b*15,b*1]);
  // Bass: slow pulsing E
  bass.push([82,t,b*4],[82,t+b*4,b*4],[82,t+b*8,b*4],[82,t+b*12,b*4]);
  // No chords yet — just atmosphere
  t += b * 16;

  // === SECTION 2: Building tension (bars 5-8) ===
  // Riff emerges, drums start light
  lead.push([165,t,b*0.4],[196,t+b*0.5,b*0.4],[220,t+b,b*0.4],[247,t+b*1.5,b*0.8]);
  lead.push([262,t+b*2.5,b*0.4],[247,t+b*3,b*0.4],[220,t+b*3.5,b*0.5]);
  lead.push([262,t+b*4,b*0.4],[294,t+b*4.5,b*0.4],[330,t+b*5,b*0.8]);
  lead.push([294,t+b*5.5,b*0.4],[262,t+b*6,b*0.4],[247,t+b*6.5,b*0.4],[220,t+b*7,b*1]);
  lead.push([247,t+b*8,b*0.4],[262,t+b*8.5,b*0.4],[294,t+b*9,b*0.8]);
  lead.push([330,t+b*10,b*0.5],[294,t+b*10.5,b*0.5],[262,t+b*11,b*1]);
  lead.push([220,t+b*12,b*0.5],[247,t+b*12.5,b*0.5],[262,t+b*13,b*0.5],[247,t+b*13.5,b*0.5]);
  lead.push([220,t+b*14,b*0.5],[196,t+b*14.5,b*0.5],[165,t+b*15,b*1]);
  bass.push([82,t,b*2],[98,t+b*2,b*2],[110,t+b*4,b*2],[98,t+b*6,b*2]);
  bass.push([82,t+b*8,b*2],[98,t+b*10,b*2],[110,t+b*12,b*2],[82,t+b*14,b*2]);
  chords.push([[165,247,330],t,b*2],[[196,294,392],t+b*2,b*2]);
  chords.push([[220,330,440],t+b*4,b*2],[[196,294,392],t+b*6,b*2]);
  chords.push([[165,247,330],t+b*8,b*2],[[196,294,392],t+b*10,b*2]);
  chords.push([[220,330,440],t+b*12,b*2],[[165,247,330],t+b*14,b*2]);
  t += b * 16;

  // === SECTION 3: Full power heroic theme (bars 9-12) ===
  // Big melody, full drums, power chords
  lead.push([330,t,b*0.8],[294,t+b,b*0.4],[330,t+b*1.5,b*0.4],[392,t+b*2,b*1.2]);
  lead.push([330,t+b*3.5,b*0.5]);
  lead.push([440,t+b*4,b*0.8],[392,t+b*5,b*0.4],[440,t+b*5.5,b*0.4],[494,t+b*6,b*1.2]);
  lead.push([440,t+b*7.5,b*0.5]);
  lead.push([523,t+b*8,b*1],[494,t+b*9,b*0.5],[440,t+b*9.5,b*0.5],[392,t+b*10,b*1]);
  lead.push([440,t+b*11,b*0.5],[392,t+b*11.5,b*0.5]);
  lead.push([330,t+b*12,b*1],[294,t+b*13,b*0.5],[262,t+b*13.5,b*0.5]);
  lead.push([294,t+b*14,b*0.5],[330,t+b*14.5,b*0.5],[294,t+b*15,b*1]);
  bass.push([82,t,b*2],[73,t+b*2,b*2],[82,t+b*4,b*2],[98,t+b*6,b*2]);
  bass.push([110,t+b*8,b*2],[98,t+b*10,b*2],[82,t+b*12,b*2],[73,t+b*14,b*2]);
  chords.push([[165,247,330],t,b*2],[[147,220,294],t+b*2,b*2]);
  chords.push([[165,247,330],t+b*4,b*2],[[196,294,392],t+b*6,b*2]);
  chords.push([[220,330,440],t+b*8,b*2],[[196,294,392],t+b*10,b*2]);
  chords.push([[165,247,330],t+b*12,b*2],[[147,220,294],t+b*14,b*2]);
  t += b * 16;

  // === SECTION 4: Intense bridge (bars 13-16) ===
  // Faster rhythm, ascending tension
  lead.push([220,t,b*0.3],[247,t+b*0.5,b*0.3],[262,t+b,b*0.3],[294,t+b*1.5,b*0.5]);
  lead.push([330,t+b*2,b*0.3],[294,t+b*2.5,b*0.3],[330,t+b*3,b*0.3],[392,t+b*3.5,b*0.5]);
  lead.push([440,t+b*4,b*0.3],[392,t+b*4.5,b*0.3],[440,t+b*5,b*0.3],[494,t+b*5.5,b*0.5]);
  lead.push([523,t+b*6,b*1],[494,t+b*7,b*0.5],[440,t+b*7.5,b*0.5]);
  lead.push([392,t+b*8,b*0.5],[440,t+b*8.5,b*0.5],[494,t+b*9,b*0.5],[523,t+b*9.5,b*0.5]);
  lead.push([587,t+b*10,b*1.5],[523,t+b*11.5,b*0.5]);
  lead.push([494,t+b*12,b*0.5],[440,t+b*12.5,b*0.5],[392,t+b*13,b*0.5],[330,t+b*13.5,b*0.5]);
  lead.push([294,t+b*14,b*0.5],[330,t+b*14.5,b*0.5],[294,t+b*15,b*1]);
  bass.push([82,t,b*1],[82,t+b,b*1],[98,t+b*2,b*1],[98,t+b*3,b*1]);
  bass.push([110,t+b*4,b*1],[110,t+b*5,b*1],[131,t+b*6,b*2]);
  bass.push([98,t+b*8,b*1],[110,t+b*9,b*1],[131,t+b*10,b*2]);
  bass.push([82,t+b*12,b*1],[98,t+b*13,b*1],[73,t+b*14,b*2]);
  chords.push([[165,247,330],t,b*2],[[196,294,392],t+b*2,b*2]);
  chords.push([[220,330,440],t+b*4,b*2],[[262,392,523],t+b*6,b*2]);
  chords.push([[196,294,392],t+b*8,b*2],[[262,392,523],t+b*10,b*2]);
  chords.push([[165,247,330],t+b*12,b*2],[[147,220,294],t+b*14,b*2]);
  t += b * 16;

  // === SECTION 5: Triumphant finale (bars 17-20) ===
  // Big sustained notes, dramatic resolution
  lead.push([330,t,b*1.5],[392,t+b*2,b*1.5]);
  lead.push([440,t+b*4,b*2],[392,t+b*6,b*1],[330,t+b*7,b*1]);
  lead.push([494,t+b*8,b*1.5],[523,t+b*10,b*1.5]);
  lead.push([587,t+b*12,b*2],[523,t+b*14,b*0.5],[494,t+b*14.5,b*0.5],[440,t+b*15,b*1]);
  // Extra 4 bars for a grand ending (bars 21-24)
  lead.push([392,t+b*16,b*1],[440,t+b*17,b*1],[494,t+b*18,b*2]);
  lead.push([523,t+b*20,b*1],[587,t+b*21,b*1],[659,t+b*22,b*2]);
  lead.push([587,t+b*24,b*1],[523,t+b*25,b*1],[494,t+b*26,b*0.5],[440,t+b*26.5,b*0.5]);
  lead.push([392,t+b*27,b*0.5],[330,t+b*27.5,b*0.5],[294,t+b*28,b*1],[330,t+b*29,b*3]);
  bass.push([82,t,b*4],[98,t+b*4,b*4],[110,t+b*8,b*4],[131,t+b*12,b*4]);
  bass.push([98,t+b*16,b*4],[110,t+b*20,b*4],[82,t+b*24,b*4],[82,t+b*28,b*4]);
  chords.push([[165,247,330],t,b*4],[[196,294,392],t+b*4,b*4]);
  chords.push([[220,330,440],t+b*8,b*4],[[262,392,523],t+b*12,b*4]);
  chords.push([[196,294,392],t+b*16,b*4],[[220,330,440],t+b*20,b*4]);
  chords.push([[165,247,330],t+b*24,b*4],[[165,247,330],t+b*28,b*4]);
  t += b * 32;

  const loopLen = t;

  function scheduleLoop() {
    if (!musicPlaying) return;
    // Lead melody - square wave for that heroic chiptune sound
    lead.forEach(([f,st,d]) => { if (f > 0) playNote(f,st,d,'square',0.035); });
    // Bass - deep sawtooth
    bass.forEach(([f,st,d]) => playNote(f,st,d,'sawtooth',0.03));
    // Power chords - layered square waves
    chords.forEach(([fs,st,d]) => fs.forEach(f => playNote(f,st,d,'square',0.012)));
    // Drums - evolve across sections
    const totalBeats = Math.ceil(loopLen / beat);
    for (let i = 0; i < totalBeats; i++) {
      const dt = beat * i;
      const section = Math.floor(i / 16);
      if (section === 0) {
        // Section 1: sparse — kick every 2 beats, soft hi-hat
        if (i % 4 === 0) playNote(50,dt,0.1,'sine',0.04);
        if (i % 2 === 0) playNote(700,dt,0.02,'square',0.006);
      } else if (section === 1) {
        // Section 2: building — add snare on 2 and 4
        if (i % 2 === 0) playNote(55,dt,0.08,'sine',0.05);
        if (i % 4 === 2) playNote(200,dt,0.05,'square',0.025);
        playNote(800,dt,0.02,'square',0.008);
      } else if (section <= 3) {
        // Sections 3-4: full power — driving beat
        if (i % 2 === 0) playNote(55,dt,0.08,'sine',0.06);
        if (i % 2 === 1) playNote(200,dt,0.05,'square',0.03);
        playNote(800,dt,0.02,'square',0.012);
        playNote(800,dt+beat*0.5,0.02,'square',0.008);
        // Extra kick hits for intensity in section 4
        if (section === 3 && i % 4 === 3) playNote(55,dt+beat*0.5,0.06,'sine',0.04);
      } else {
        // Section 5: epic finale — half-time feel with big hits
        if (i % 4 === 0) { playNote(55,dt,0.12,'sine',0.07); playNote(55,dt+beat*0.5,0.08,'sine',0.04); }
        if (i % 4 === 2) playNote(180,dt,0.08,'square',0.035);
        playNote(800,dt,0.02,'square',0.01);
        // Cymbal crashes on section start
        if (i % 16 === 0) playNote(600,dt,0.4,'square',0.02);
      }
    }
    _musicLoopTimer = setTimeout(scheduleLoop, loopLen * 1000);
  }
  scheduleLoop();
}

function stopMusic() {
  musicPlaying = false;
  document.getElementById('music-btn').textContent = 'Music: OFF';
  // Cancel any pending loop
  if (_musicLoopTimer) { clearTimeout(_musicLoopTimer); _musicLoopTimer = null; }
  // Close audio context to immediately silence all scheduled notes
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
  }
}

// ---- BUILDING TRANSITION SOUNDS ----
// Each building gets a unique short sound effect that plays as you enter
function playBuildingSound(buildingName) {
  // Kill music immediately
  stopMusic();
  // Create a fresh context for the transition sound
  const sfxCtx = new (window.AudioContext || window.webkitAudioContext)();

  function sfxNote(freq, start, dur, type, vol) {
    const osc = sfxCtx.createOscillator();
    const gain = sfxCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, sfxCtx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, sfxCtx.currentTime + start + dur);
    osc.connect(gain);
    gain.connect(sfxCtx.destination);
    osc.start(sfxCtx.currentTime + start);
    osc.stop(sfxCtx.currentTime + start + dur);
  }

  switch(buildingName) {
    case 'STAIR FALLS':
      // Descending tumble sounds - quick notes going down
      sfxNote(440, 0, 0.1, 'square', 0.08);
      sfxNote(392, 0.08, 0.1, 'square', 0.07);
      sfxNote(330, 0.16, 0.1, 'square', 0.06);
      sfxNote(262, 0.24, 0.12, 'square', 0.06);
      sfxNote(196, 0.34, 0.15, 'square', 0.05);
      sfxNote(130, 0.46, 0.2, 'sine', 0.07); // thud
      break;
    case 'FIRE BURNS':
      // Crackling fire whoosh - rising noise
      for (let i = 0; i < 8; i++) {
        sfxNote(200 + i*60, i*0.06, 0.12, 'sawtooth', 0.03);
        sfxNote(150 + Math.random()*300, i*0.06, 0.08, 'square', 0.02);
      }
      sfxNote(600, 0.5, 0.3, 'sawtooth', 0.04); // roar
      break;
    case 'HIGH FALLS':
      // Wind whistle rising then falling
      sfxNote(300, 0, 0.15, 'sine', 0.06);
      sfxNote(400, 0.1, 0.15, 'sine', 0.07);
      sfxNote(500, 0.2, 0.15, 'sine', 0.08);
      sfxNote(600, 0.3, 0.2, 'sine', 0.07);
      sfxNote(400, 0.45, 0.15, 'sine', 0.05);
      sfxNote(200, 0.55, 0.2, 'sine', 0.04);
      sfxNote(100, 0.7, 0.3, 'sine', 0.06); // impact
      break;
    case 'STUNT COORD':
      // Movie clapboard snap + dramatic chord
      sfxNote(800, 0, 0.03, 'square', 0.1); // snap
      sfxNote(900, 0.02, 0.03, 'square', 0.08);
      sfxNote(220, 0.08, 0.4, 'triangle', 0.05); // dramatic chord
      sfxNote(330, 0.08, 0.4, 'triangle', 0.04);
      sfxNote(440, 0.08, 0.4, 'triangle', 0.03);
      break;
  }
  // Auto-close sfx context after sounds finish
  setTimeout(() => sfxCtx.close(), 2000);
}

let gameStarted = false;
let dialogueActive = false;

let dialogueIndex = 0;
let nearBuilding = null;
let nearNPC = null;
let nearHighScoreSign = false;
let nearStuntSign = false;

let ladderFall = null; // { x, fallStartY, groundY, phase: 'falling'|'landed', progress }
let onLadderLocked = null; // reference to the ladder the player is locked onto, or null
let frame = 0;

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (highScoreActive) {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
      e.preventDefault();
      switchHSTab((hsActiveTab - 1 + 5) % 5);
      return;
    }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      e.preventDefault();
      switchHSTab((hsActiveTab + 1) % 5);
      return;
    }
  }
  if (e.key === ' ' || e.key === 'e' || e.key === 'E') {
    e.preventDefault();
    handleAction();
  }
});
window.addEventListener('keyup', e => keys[e.key] = false);

function handleAction() {
  if (highScoreActive) {
    closeHighScores();
    return;
  }
  if (dialogueActive) {
    dialogueIndex++;
    const round = npcTalkCount[currentDialogue.name] || 0;
    if (dialogueIndex >= currentDialogue.rounds[round].length) {
      npcTalkCount[currentDialogue.name] = (round + 1) % currentDialogue.rounds.length;
      closeDialogue();
    } else {
      showDialogueLine();
    }
  } else if (nearNPC) {
    openDialogue(nearNPC);
  } else if (nearStuntSign) {
    openDialogue(stuntSignDialogue);
  } else if (nearHighScoreSign) {
    openHighScores();
  }
}

// ---- TOUCH CONTROLS (Omnidirectional Joystick) ----
const joystick = { x: 0, y: 0, active: false }; // -1 to 1 range
let joystickTouchId = null;

function setupTouch() {
  if (!isTouchDevice) return;
  const jArea = document.getElementById('joystick-area');
  jArea.style.display = 'block';
  // Action button starts hidden - shown when near NPC or building
  document.getElementById('touch-action-btn').style.display = 'none';

  const jCanvas = document.getElementById('joystick-canvas');
  const jCtx = jCanvas.getContext('2d');
  const jR = 60; // radius of outer ring
  const knobR = 22; // radius of thumb knob

  // Floating joystick origin (where touch started)
  let joystickOriginX = 0;
  let joystickOriginY = 0;
  const joystickRadius = 60; // pixels from origin to full tilt

  function drawJoystick() {
    jCtx.clearRect(0, 0, 120, 120);
    // Outer ring
    jCtx.beginPath();
    jCtx.arc(60, 60, jR-2, 0, Math.PI*2);
    jCtx.fillStyle = 'rgba(232,193,112,0.12)';
    jCtx.fill();
    jCtx.strokeStyle = 'rgba(232,193,112,0.35)';
    jCtx.lineWidth = 2;
    jCtx.stroke();
    // Inner knob
    const kx = 60 + joystick.x * (jR - knobR);
    const ky = 60 + joystick.y * (jR - knobR);
    jCtx.beginPath();
    jCtx.arc(kx, ky, knobR, 0, Math.PI*2);
    jCtx.fillStyle = joystick.active ? 'rgba(232,193,112,0.5)' : 'rgba(232,193,112,0.25)';
    jCtx.fill();
    jCtx.strokeStyle = 'rgba(232,193,112,0.6)';
    jCtx.lineWidth = 2;
    jCtx.stroke();
    requestAnimationFrame(drawJoystick);
  }
  drawJoystick();

  function updateJoystickFromTouch(touch) {
    let dx = (touch.clientX - joystickOriginX) / joystickRadius;
    let dy = (touch.clientY - joystickOriginY) / joystickRadius;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 1) { dx /= dist; dy /= dist; }
    joystick.x = dx;
    joystick.y = dy;
  }

  // Floating joystick: touch anywhere on right half of screen to start
  // Also accept touches directly on the joystick area
  const wrapper = document.getElementById('game-wrapper');
  const actBtn = document.getElementById('touch-action-btn');

  function isRightHalf(touch) {
    const rect = wrapper.getBoundingClientRect();
    return touch.clientX > rect.left + rect.width * 0.4;
  }

  function isOnActionBtn(touch) {
    const rect = actBtn.getBoundingClientRect();
    return actBtn.style.display !== 'none' &&
      touch.clientX >= rect.left && touch.clientX <= rect.right &&
      touch.clientY >= rect.top && touch.clientY <= rect.bottom;
  }

  // Listen on document for all touch events to ensure we never miss them
  document.addEventListener('touchstart', e => {
    if (dialogueActive) {
      handleAction();
      return;
    }
    for (const touch of e.changedTouches) {
      // If touching the action button, fire the action and stop
      if (isOnActionBtn(touch)) {
        e.preventDefault();
        handleAction();
        return;
      }
      // Start joystick on right-half touch (or on the joystick area itself)
      if (joystickTouchId === null && isRightHalf(touch)) {
        e.preventDefault();
        joystickTouchId = touch.identifier;
        joystickOriginX = touch.clientX;
        joystickOriginY = touch.clientY;
        // Move the joystick visual to where the touch started
        const wrapRect = wrapper.getBoundingClientRect();
        jArea.style.right = 'auto';
        jArea.style.left = (touch.clientX - wrapRect.left - 60) + 'px';
        jArea.style.top = (touch.clientY - wrapRect.top - 60) + 'px';
        jArea.style.bottom = 'auto';
        joystick.x = 0;
        joystick.y = 0;
        joystick.active = true;
      }
    }
  }, {passive:false});

  document.addEventListener('touchmove', e => {
    for (const touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        e.preventDefault();
        updateJoystickFromTouch(touch);
      }
    }
  }, {passive:false});

  function releaseJoystick(e) {
    for (const touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        joystick.x = 0; joystick.y = 0;
        joystick.active = false;
        joystickTouchId = null;
        // Reset joystick visual position to default bottom-right
        jArea.style.left = 'auto';
        jArea.style.top = 'auto';
        jArea.style.right = '16px';
        jArea.style.bottom = '16px';
      }
    }
  }
  document.addEventListener('touchend', releaseJoystick, {passive:false});
  document.addEventListener('touchcancel', releaseJoystick, {passive:false});

  // Action button touch is handled by the document-level touchstart above
  // (via isOnActionBtn check) — no separate listener needed to avoid double-firing
}

// Fix back button: if browser restores page from bfcache mid-navigation, full reset
window.addEventListener('pageshow', function(e) {
  if (e.persisted || enteringBuilding) {
    // Move player back outside the building they walked into
    if (enterBuildingAnim && enterBuildingAnim.building) {
      const b = enterBuildingAnim.building;
      if (b.doorSide === 'bottom') {
        player.x = b.doorX * TILE - 10;
        player.y = (b.doorY + 1) * TILE;
        player.dir = 0; // face down
      } else {
        player.x = b.doorX * TILE - 10;
        player.y = (b.doorY - 1.5) * TILE;
        player.dir = 3; // face up
      }
    }
    enteringBuilding = false;
    enterBuildingAnim = null;
    // Remove the localStorage entry so it doesn't trigger return animation
    localStorage.removeItem('stuntschool_lastbuilding');
    // Hide lingering prompts
    const ep = document.getElementById('enter-prompt');
    if (ep) ep.style.display = 'none';
    const ab = document.getElementById('touch-action-btn');
    if (ab) ab.style.display = 'none';
    // Restore UI that was hidden during building entry
    const mb = document.getElementById('music-btn');
    if (mb) mb.style.display = 'block';
    const jArea = document.getElementById('joystick-area');
    if (jArea && isTouchDevice) jArea.style.display = 'block';
    // Restart music only if it was playing before (avoid double-play)
    if (musicInitStarted && !musicPlaying) {
      initAudio();
      playMusic();
    }
    // Cancel any stacked game loops, then restart a single one
    if (gameLoopId) cancelAnimationFrame(gameLoopId);
    if (typeof draw === 'function') draw();
    gameLoopId = requestAnimationFrame(gameLoop);
  }
});

// Spawn position: check localStorage for returning from a building
function getSpawnPos() {
  const lastBuilding = localStorage.getItem('stuntschool_lastbuilding');
  if (lastBuilding) {
    localStorage.removeItem('stuntschool_lastbuilding');
    const spawns = {
      'stairfalls': { x: 4 * TILE, y: 8 * TILE, dir: 0 },
      'fireburns':  { x: 12 * TILE, y: 8 * TILE, dir: 0 },
      'highfalls':  { x: 4 * TILE, y: 19 * TILE, dir: 3 },
      'stuntcoord': { x: 12 * TILE, y: 19 * TILE, dir: 3 }
    };
    // Set return animation based on which building
    if (lastBuilding === 'stairfalls') returnAnim = { type: 'stairfall', timer: 120 };
    else if (lastBuilding === 'fireburns') returnAnim = { type: 'onfire', timer: 300 }; // ~5 seconds
    else if (lastBuilding === 'highfalls') returnAnim = { type: 'hardfall', timer: 80 };
    else if (lastBuilding === 'stuntcoord') { returnAnim = { type: 'cool', timer: 60 }; hasSunglasses = true; }
    if (spawns[lastBuilding]) return spawns[lastBuilding];
  }
  return { x: 8 * TILE, y: 13.5 * TILE, dir: 0 };
}

// ---- COLLISION ----
function isBlocked(px, py, pw, ph) {
  const left = Math.floor(px / TILE);
  const right = Math.floor((px + pw - 1) / TILE);
  const top = Math.floor(py / TILE);
  const bottom = Math.floor((py + ph - 1) / TILE);
  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (ty < 0 || ty >= MAP_H || tx < 0 || tx >= MAP_W) return true;
      if (map[ty][tx] === 2 || map[ty][tx] === 3) return true;
    }
  }
  outerBuildingLoop: for (const b of buildings) {
    const doorCx = b.doorX * TILE;
    const doorCy = b.doorY * TILE;
    const pcx = px + pw/2;
    const pcy = py + ph/2;
    const inDoorZone = Math.abs(pcx - doorCx) < 30 && Math.abs(pcy - doorCy) < TILE * 1.5;
    if (inDoorZone) continue;

    const bx1 = b.x * TILE, by1 = b.y * TILE;
    const bx2 = (b.x + b.w) * TILE, by2 = (b.y + b.h) * TILE;
    if (px + pw > bx1 && px < bx2 && py + ph > by1 && py < by2) {
      // Allow walking through ladder zones if:
      // 1) Already locked onto a ladder, OR
      // 2) Entering from above the roof (pcy near building top) and centered on a ladder
      if (b.special === 'tower' && typeof climbableLadders !== 'undefined') {
        if (onLadderLocked) {
          // When locked on a ladder, allow full passage through the building
          // Player is snapped to ladder center so no risk of exploiting this
          continue;
        } else {
          // Allow entry from the base (bottom) of the building only
          for (const lad of climbableLadders) {
            const ladCenter = lad.worldX + 7;
            if (Math.abs(pcx - ladCenter) <= 10) {
              // Near the bottom of the building
              const nearBottom = pcy >= by2 - 50 && pcy <= by2 + 35;
              if (nearBottom) {
                continue outerBuildingLoop;
              }
            }
          }
        }
      }
      return true;
    }
  }
  // NPC collision - can't walk through characters
  for (const npc of npcs) {
    const nx = npc.x, ny = npc.y;
    const nw = npc.w || 24, nh = npc.h || 28;
    if (px + pw > nx && px < nx + nw && py + ph > ny && py < ny + nh) {
      return true;
    }
  }
  // Gate collision
  for (const d of decorations) {
    if (d.type === 'gate') {
      if (px + pw > d.x - 2 && px < d.x + 26 && py + ph > d.y && py < d.y + TILE*4) {
        return true;
      }
    }
  }
  return false;
}

// ---- DRAWING ----
function drawTile(tx, ty) {
  const x = tx * TILE, y = ty * TILE;
  const tile = map[ty][tx];
  switch(tile) {
    case 0:
      ctx.fillStyle = '#4a8c3f';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#56a044';
      if ((tx+ty)%3===0) { ctx.fillRect(x+4,y+8,2,4); ctx.fillRect(x+20,y+18,2,4); }
      if ((tx+ty)%5===0) ctx.fillRect(x+14,y+4,2,3);
      break;
    case 1:
      ctx.fillStyle = '#c4a76c';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#b89a5f';
      if ((tx+ty)%2===0) { ctx.fillRect(x+6,y+6,4,4); ctx.fillRect(x+20,y+22,3,3); }
      break;
    case 2:
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#6b5a4a';
      ctx.fillRect(x+2,y+2,TILE-4,TILE-4);
      ctx.fillStyle = '#4a3a2a';
      ctx.fillRect(x+14,y,4,TILE);
      ctx.fillRect(x,y+14,TILE,4);
      break;
    case 3:
      ctx.fillStyle = '#2a6fc4';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#3a7fd4';
      const wo = Math.sin(frame*0.05+tx+ty)*3;
      ctx.fillRect(x+4+wo,y+8,12,2);
      ctx.fillRect(x+10-wo,y+20,10,2);
      break;
    case 4:
      ctx.fillStyle = '#4a8c3f';
      ctx.fillRect(x, y, TILE, TILE);
      const cols = ['#ff6b8a','#ffdb58','#ff8c42','#c990ff'];
      for (let i=0;i<3;i++) {
        ctx.fillStyle = cols[(tx*3+ty*7+i)%cols.length];
        ctx.fillRect(x+4+i*10+((tx+i)%3), y+6+((ty+i*5)%16), 4, 4);
        ctx.fillStyle = '#56a044';
        ctx.fillRect(x+5+i*10+((tx+i)%3), y+10+((ty+i*5)%16), 2, 4);
      }
      break;
    case 5:
      ctx.fillStyle = '#3a7030';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#2f6028';
      ctx.fillRect(x+8,y+4,3,5); ctx.fillRect(x+18,y+16,3,5);
      break;
  }
}

function drawDoorLight(doorX, doorY, facesUp, color) {
  // Light cone spilling out of the doorway
  const cx = doorX * TILE;
  const cy = doorY * TILE;
  const dir = facesUp ? -1 : 1;
  const r = color || [255, 220, 140];
  // Layered glow getting wider and fainter
  for (let i = 0; i < 5; i++) {
    const spread = 6 + i * 6;
    const dist = 4 + i * 8;
    const alpha = 0.12 - i * 0.02;
    ctx.fillStyle = `rgba(${r[0]},${r[1]},${r[2]},${alpha})`;
    ctx.fillRect(cx - spread, cy + dir * dist, spread * 2, 8);
  }
}

function drawBuilding(b) {
  const x = b.x*TILE, y = b.y*TILE, w = b.w*TILE, h = b.h*TILE;
  const doorAtTop = b.doorSide === 'top';

  // Each building has a completely unique look
  switch(b.special) {

    case 'tower': {
      // HIGH FALLS: Simple building with a big ladder on the outside
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x+4, y+4, w, h);

      // Main building body (blue-grey concrete)
      ctx.fillStyle = '#5a7090';
      ctx.fillRect(x, y, w, h);
      // Darker edge for depth
      ctx.fillStyle = '#4a6080';
      ctx.fillRect(x+w-6, y, 6, h);
      // Lighter top
      ctx.fillStyle = '#6a80a0';
      ctx.fillRect(x+2, y+2, w-8, 6);

      // Windows
      ctx.fillStyle = '#c0d8f0';
      ctx.fillRect(x+8, y+12, 12, 10);
      ctx.fillRect(x+w-20, y+14, 12, 10);
      ctx.fillRect(x+8, y+h-24, 12, 10);
      // Window crosses
      ctx.fillStyle = '#4a6080';
      ctx.fillRect(x+13, y+12, 2, 10);
      ctx.fillRect(x+8, y+16, 12, 2);

      // Roof edge
      ctx.fillStyle = '#3a5070';
      ctx.fillRect(x-2, y-4, w+4, 6);

      // Safety net at base
      ctx.fillStyle = '#4466cc';
      ctx.fillRect(x+6, y+h-8, w-12, 6);
      ctx.fillStyle = '#5577dd';
      ctx.fillRect(x+8, y+h-6, w-16, 3);

      // Helper to draw a ladder at (lx, ly) with given height
      function drawLadder(lx, ly, lh) {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(lx+3, ly+4, 14, lh);
        // Rails
        ctx.fillStyle = '#bb8830';
        ctx.fillRect(lx, ly, 3, lh);
        ctx.fillRect(lx+12, ly, 3, lh);
        // Rungs
        ctx.fillStyle = '#cc9940';
        for (let i = 0; i < Math.floor(lh/6); i++) {
          ctx.fillRect(lx+2, ly + i*6, 11, 2);
        }
        // Highlight on rails
        ctx.fillStyle = '#ddaa44';
        ctx.fillRect(lx, ly, 1, lh);
        ctx.fillRect(lx+12, ly, 1, lh);
      }

      // Main tall ladder on the left side
      drawLadder(x + 6, y - 50, h + 50);
      // Shorter ladder on the right side
      drawLadder(x + w - 18, y - 20, h + 20);
      // Small ladder leaning against the front
      drawLadder(x + w/2 - 6, y + h - 40, 38);
      // Extension ladder far left (leaning against wall)
      drawLadder(x - 14, y - 30, h + 28);

      // Warning tape at base
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(x-18, y+h, w+22, 3);
      ctx.fillStyle = '#222';
      for (let i = 0; i < 10; i++) ctx.fillRect(x-18+i*7, y+h, 3, 3);

      // Open doorway
      const dy1 = doorAtTop ? y-6 : y+h-12;
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(x+w/2-8, dy1, 16, 16);
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(x+w/2-6, dy1+2, 12, 12);
      // Door frame - lintel on the building side, open on the path side
      ctx.fillStyle = '#5a7090';
      ctx.fillRect(x+w/2-9, dy1, 2, 16);
      ctx.fillRect(x+w/2+7, dy1, 2, 16);
      if (doorAtTop) {
        ctx.fillRect(x+w/2-9, dy1+14, 18, 2); // lintel at bottom (building side)
      } else {
        ctx.fillRect(x+w/2-9, dy1, 18, 2); // lintel at top (building side)
      }
      break;
    }

    case 'fire': {
      // FIRE BURNS: ENGULFED in fire - barely visible building under massive flames
      // Heat glow on ground around building
      ctx.fillStyle = 'rgba(255,60,0,0.08)';
      ctx.fillRect(x-16, y-10, w+32, h+24);
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(x+3, y+3, w, h);
      // Charred building body (barely visible under flames)
      ctx.fillStyle = '#2a0a00';
      ctx.fillRect(x, y, w, h);
      // Scorched brick pattern
      ctx.fillStyle = '#3a1508';
      for (let by=0;by<h;by+=6) for (let bx=0;bx<w;bx+=8) {
        ctx.fillRect(x+bx+((by/6)%2)*4, y+by, 7, 5);
      }
      // Glowing windows (fire inside)
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(x+4, y+8, 10, 10);
      ctx.fillRect(x+w-14, y+10, 10, 10);
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(x+6, y+10, 6, 6);
      ctx.fillRect(x+w-12, y+12, 6, 6);
      ctx.fillStyle = '#ffee88';
      ctx.fillRect(x+7, y+11, 4, 4);
      ctx.fillRect(x+w-11, y+13, 4, 4);

      // MASSIVE FLAMES - roof, sides, everywhere
      // Roof inferno (10 flame columns)
      for (let i=0;i<10;i++) {
        const fx = x - 4 + i*(w+8)/10;
        const phase = i*1.3+frame*0.14;
        const fh = 18 + Math.sin(phase)*10 + Math.sin(phase*1.7)*5;
        const fh2 = 14 + Math.sin(phase*1.3+1)*7;
        const fh3 = 8 + Math.sin(phase*1.8+2)*5;
        ctx.fillStyle = '#aa1100';
        ctx.fillRect(fx-1, y-fh-4, 12, fh+8);
        ctx.fillStyle = '#dd2200';
        ctx.fillRect(fx+1, y-fh, 8, fh+4);
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(fx+2, y-fh2-2, 6, fh2+4);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(fx+3, y-fh3, 4, fh3+2);
        ctx.fillStyle = '#ffdd44';
        ctx.fillRect(fx+3, y-fh3-2, 3, 4);
        ctx.fillStyle = '#fff8cc';
        ctx.fillRect(fx+4, y-fh3-4, 2, 3);
      }
      // LEFT SIDE wall of flames
      for (let i=0;i<4;i++) {
        const fy = y + 4 + i*(h/4);
        const fw = 8 + Math.sin(frame*0.16+i*2)*5;
        ctx.fillStyle = '#dd2200';
        ctx.fillRect(x-fw, fy, fw+4, 14);
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(x-fw+2, fy+2, fw-2, 10);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(x-fw+4, fy+4, fw-6, 6);
      }
      // RIGHT SIDE wall of flames
      for (let i=0;i<4;i++) {
        const fy = y + 2 + i*(h/4);
        const fw = 8 + Math.sin(frame*0.18+i*1.7+1)*5;
        ctx.fillStyle = '#dd2200';
        ctx.fillRect(x+w-4, fy, fw+4, 14);
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(x+w-2, fy+2, fw-2, 10);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(x+w, fy+4, fw-6, 6);
      }
      // Fire on the ground in front
      for (let i=0;i<5;i++) {
        const gx = x - 8 + i*(w+16)/5;
        const gh = 6 + Math.sin(frame*0.2+i*1.5)*3;
        ctx.fillStyle = '#cc2200';
        ctx.fillRect(gx, y+h, 10, gh);
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(gx+2, y+h, 6, gh-2);
      }
      // Thick smoke columns
      ctx.fillStyle = 'rgba(40,40,40,0.3)';
      for (let i=0;i<5;i++) {
        const sy = y-30-i*12-Math.sin(frame*0.025+i)*8;
        const sx = x+w/2-10+Math.sin(frame*0.035+i*2.5)*12;
        ctx.beginPath();
        ctx.arc(sx+8, sy, 10+i*4, 0, Math.PI*2);
        ctx.fill();
      }
      // Lots of ember particles flying up
      ctx.fillStyle = '#ff8800';
      for (let i=0;i<12;i++) {
        const ex = x-10+Math.sin(frame*0.06+i*2.7)*(w/2+20)+w/2+10;
        const ey = y-8-((frame*0.9+i*15)%70);
        ctx.fillRect(ex, ey, 2, 2);
      }
      ctx.fillStyle = '#ffcc44';
      for (let i=0;i<8;i++) {
        const ex = x+Math.sin(frame*0.08+i*3.1)*w/2+w/2;
        const ey = y-5-((frame*1.2+i*12)%55);
        ctx.fillRect(ex, ey, 1, 1);
      }
      // Scorch marks on ground
      ctx.fillStyle = 'rgba(30,10,0,0.35)';
      ctx.fillRect(x-10, y+h+6, w+20, 8);
      // Open doorway (glowing from fire inside)
      const dy2 = doorAtTop ? y-4 : y+h-12;
      ctx.fillStyle = '#1a0800';
      ctx.fillRect(x+w/2-8, dy2, 16, 16);
      ctx.fillStyle = '#331100';
      ctx.fillRect(x+w/2-6, dy2+2, 12, 12);
      // Firelight glow from inside
      ctx.fillStyle = 'rgba(255,100,0,0.3)';
      ctx.fillRect(x+w/2-6, dy2+2, 12, 12);
      // Metal frame - lintel on building side
      ctx.fillStyle = '#666';
      ctx.fillRect(x+w/2-9, dy2, 2, 16);
      ctx.fillRect(x+w/2+7, dy2, 2, 16);
      if (doorAtTop) {
        ctx.fillRect(x+w/2-9, dy2+14, 18, 2);
      } else {
        ctx.fillRect(x+w/2-9, dy2, 18, 2);
      }
      break;
    }

    case 'stairs': {
      // STAIR FALLS: The entire building IS stairs - stair-shaped silhouette
      // Everything is diagonal steps

      const stepW = 10, stepH = 6;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(x+4, y+4, w+4, h+4);

      // === THE BUILDING ITSELF is stair-shaped ===
      // Left side: stair-stepped silhouette going up-right
      // The building outline is a staircase shape, not a rectangle
      const numBuildSteps = 10;
      for (let i=0;i<numBuildSteps;i++) {
        const sx = x + i * (w/numBuildSteps);
        const sy = y + h - (i+1) * (h/numBuildSteps);
        const sw = w - i * (w/numBuildSteps);
        const sh = (h/numBuildSteps);
        // Stone fill
        ctx.fillStyle = i%2===0 ? '#6b5b45' : '#63543f';
        ctx.fillRect(sx, sy, sw, sh+1);
        // Step edge (lighter top)
        ctx.fillStyle = '#c4a76c';
        ctx.fillRect(sx, sy, sw, 2);
        // Step front face (darker)
        ctx.fillStyle = '#5a4a38';
        ctx.fillRect(sx, sy+sh-1, w/numBuildSteps, 2);
      }

      // === FRONT: Grand staircase descending toward the player ===
      // Wide staircase coming out the front of the building
      const frontSteps = 8;
      const frontDir = doorAtTop ? -1 : 1; // stairs go toward door side
      const frontBaseY = doorAtTop ? y - 4 : y + h + 2;
      for (let i=0;i<frontSteps;i++) {
        const sw = w - 20 + i * 6; // gets wider as it descends
        const sx = x + w/2 - sw/2;
        const sy = frontBaseY + i * 7 * frontDir;
        // Step top surface
        ctx.fillStyle = '#d4b878';
        ctx.fillRect(sx, sy, sw, 4);
        // Step front edge
        ctx.fillStyle = '#b89a5a';
        ctx.fillRect(sx, sy + (frontDir > 0 ? 3 : -2), sw, 3);
        // Step shadow/depth
        ctx.fillStyle = '#a08848';
        ctx.fillRect(sx, sy + (frontDir > 0 ? 5 : -3), sw, 2);
      }

      // Railing posts along front staircase
      ctx.fillStyle = '#8a7a60';
      for (let i=0;i<frontSteps;i+=2) {
        const sw = w - 20 + i * 6;
        const sx = x + w/2 - sw/2;
        const sy = frontBaseY + i * 7 * frontDir;
        // Left post
        ctx.fillRect(sx-2, sy-8, 3, 12);
        // Right post
        ctx.fillRect(sx+sw-1, sy-8, 3, 12);
      }
      // Railing diagonal lines
      ctx.fillStyle = '#7a6a50';
      for (let i=0;i<frontSteps-1;i++) {
        const sw1 = w - 20 + i * 6;
        const sw2 = w - 20 + (i+1) * 6;
        const sy1 = frontBaseY + i * 7 * frontDir - 4;
        const sy2 = frontBaseY + (i+1) * 7 * frontDir - 4;
        // Left railing segments
        ctx.fillRect(x+w/2-sw1/2-1, sy1, 2, 8);
        // Right railing segments
        ctx.fillRect(x+w/2+sw1/2, sy1, 2, 8);
      }

      // === ROOF: Stair-stepped top going even higher ===
      for (let i=0;i<6;i++) {
        const rw = w - 10 - i*10;
        if (rw < 8) break;
        const rx = x + 4 + i*5;
        const ry = y - 6 - i*8;
        ctx.fillStyle = '#c4a76c';
        ctx.fillRect(rx, ry, rw, 4);
        ctx.fillStyle = '#b89a5a';
        ctx.fillRect(rx, ry+3, rw, 2);
        ctx.fillStyle = '#5a4a38';
        ctx.fillRect(rx, ry+5, 2, 3);
      }

      // === Small diagonal staircase patterns ON the facade ===
      // Left diagonal going up-right
      for (let i=0;i<5;i++) {
        ctx.fillStyle = '#c4a76c';
        ctx.fillRect(x+4+i*8, y+h-10-i*8, 8, 3);
        ctx.fillStyle = '#a89060';
        ctx.fillRect(x+4+i*8, y+h-8-i*8, 8, 2);
      }
      // Right diagonal going up-left
      for (let i=0;i<4;i++) {
        ctx.fillStyle = '#d4b878';
        ctx.fillRect(x+w-12-i*8, y+h-14-i*7, 8, 3);
        ctx.fillStyle = '#bfa668';
        ctx.fillRect(x+w-12-i*8, y+h-12-i*7, 8, 2);
      }

      // Crash pad at bottom of front stairs
      const padY = frontBaseY + (frontSteps-1)*7*frontDir + (frontDir>0?8:-8);
      ctx.fillStyle = '#4466aa';
      ctx.fillRect(x+4, padY, w-8, 5);
      ctx.fillStyle = '#5577bb';
      ctx.fillRect(x+6, padY+1, w-12, 3);

      // Caution tape
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(x-2, y+h-1, w+4, 2);
      ctx.fillStyle = '#222';
      for (let i=0;i<8;i++) ctx.fillRect(x-2+i*6, y+h-1, 3, 2);

      // Open doorway at top of front stairs
      const dy3 = doorAtTop ? y-6 : y+h-10;
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(x+w/2-8, dy3, 16, 16);
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(x+w/2-6, dy3+2, 12, 12);
      ctx.fillStyle = '#6b5530';
      ctx.fillRect(x+w/2-9, dy3, 2, 16);
      ctx.fillRect(x+w/2+7, dy3, 2, 16);
      if (doorAtTop) {
        ctx.fillRect(x+w/2-9, dy3+14, 18, 2);
      } else {
        ctx.fillRect(x+w/2-9, dy3, 18, 2);
      }
      break;
    }

    case 'office': {
      // STUNT COORDINATOR: Burt Reynolds face from overhead - big hair, sunglasses, mustache
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x+4, y+4, w, h);

      // Head/face shape (skin tone)
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(x+6, y+20, w-12, h-28);
      ctx.fillStyle = '#c89868';
      ctx.fillRect(x+4, y+26, w-8, h-40);
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(x+2, y+32, w-4, h-50);

      // === BIG VOLUMINOUS HAIR (top third of building) ===
      ctx.fillStyle = '#1a1008';
      // Main hair mass - thick and full
      ctx.fillRect(x-2, y-4, w+4, 36);
      ctx.fillRect(x-4, y+2, w+8, 28);
      ctx.fillRect(x-6, y+6, w+12, 20);
      // Hair volume on top (big 70s style)
      ctx.fillStyle = '#221510';
      ctx.fillRect(x+4, y-8, w-8, 10);
      ctx.fillRect(x+8, y-12, w-16, 6);
      // Hair wave/texture
      ctx.fillStyle = '#2a1a10';
      ctx.fillRect(x+6, y+4, 8, 3);
      ctx.fillRect(x+w-14, y+6, 8, 3);
      ctx.fillRect(x+w/2-6, y+2, 12, 2);
      // Sideburns going down the sides
      ctx.fillStyle = '#1a1008';
      ctx.fillRect(x-2, y+30, 8, 30);
      ctx.fillRect(x+w-6, y+30, 8, 30);
      // Sideburn taper
      ctx.fillStyle = '#221510';
      ctx.fillRect(x, y+50, 5, 12);
      ctx.fillRect(x+w-5, y+50, 5, 12);

      // Forehead (skin showing between hair and glasses)
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(x+6, y+30, w-12, 16);

      // === BIG AVIATOR SUNGLASSES (middle of face) ===
      const glassY = y + 44;
      const glassH = 28;
      const lensW = (w-14)/2;
      // Left lens
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(x+4, glassY, lensW+2, glassH);
      ctx.fillRect(x+2, glassY+4, lensW+6, glassH-8);
      // Right lens
      ctx.fillRect(x+w-6-lensW, glassY, lensW+2, glassH);
      ctx.fillRect(x+w-8-lensW, glassY+4, lensW+6, glassH-8);
      // Gold frames
      ctx.fillStyle = '#aa7722';
      ctx.fillRect(x+1, glassY-2, lensW+8, 3);
      ctx.fillRect(x+w-9-lensW, glassY-2, lensW+8, 3);
      ctx.fillRect(x+1, glassY+glassH-1, lensW+8, 3);
      ctx.fillRect(x+w-9-lensW, glassY+glassH-1, lensW+8, 3);
      // Bridge
      ctx.fillStyle = '#aa7722';
      ctx.fillRect(x+6+lensW, glassY+glassH/2-2, w-12-lensW*2, 4);
      // Lens shine
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(x+6, glassY+4, 8, 6);
      ctx.fillRect(x+w-4-lensW, glassY+4, 8, 6);
      // Temple arms extending to sides
      ctx.fillStyle = '#aa7722';
      ctx.fillRect(x-10, glassY+glassH/2-1, 14, 3);
      ctx.fillRect(x+w-4, glassY+glassH/2-1, 14, 3);

      // Nose hint
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(x+w/2-4, glassY+glassH+2, 8, 6);

      // === BIG MUSTACHE ===
      const mustY = glassY + glassH + 8;
      ctx.fillStyle = '#1a1008';
      ctx.fillRect(x+w/2-22, mustY, 44, 7);
      ctx.fillRect(x+w/2-26, mustY+2, 52, 5);
      ctx.fillRect(x+w/2-28, mustY+4, 4, 4); // left curl
      ctx.fillRect(x+w/2+24, mustY+4, 4, 4); // right curl
      ctx.fillRect(x+w/2-30, mustY+6, 4, 3); // left curl down
      ctx.fillRect(x+w/2+26, mustY+6, 4, 3); // right curl down
      ctx.fillStyle = '#2a1a10';
      ctx.fillRect(x+w/2-1, mustY, 2, 7);

      // Mouth/smirk
      ctx.fillStyle = '#b07050';
      ctx.fillRect(x+w/2-8, mustY+10, 16, 2);

      // Chin
      ctx.fillStyle = '#c89868';
      ctx.fillRect(x+8, mustY+14, w-16, 14);
      ctx.fillStyle = '#ba8858';
      ctx.fillRect(x+12, mustY+22, w-24, 8);

      // Open doorway - big and obvious
      const dy4 = doorAtTop ? y-8 : y+h-2;
      // Dark entrance
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(x+w/2-10, dy4, 20, 18);
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(x+w/2-8, dy4+2, 16, 14);
      // Bright frame so it's visible against the face
      ctx.fillStyle = '#cc4444';
      ctx.fillRect(x+w/2-11, dy4, 2, 18);
      ctx.fillRect(x+w/2+9, dy4, 2, 18);
      if (doorAtTop) {
        ctx.fillRect(x+w/2-11, dy4+16, 22, 2); // lintel at bottom (building side)
      } else {
        ctx.fillRect(x+w/2-11, dy4, 22, 2); // lintel at top (building side)
      }
      // Welcome mat / step
      ctx.fillStyle = '#aa3333';
      if (doorAtTop) {
        ctx.fillRect(x+w/2-8, dy4-4, 16, 4);
      } else {
        ctx.fillRect(x+w/2-8, dy4+18, 16, 4);
      }
      break;
    }
  }

  // Per-building label positioning
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';

  if (b.special === 'stairs') {
    // 45 degree angle label
    ctx.save();
    ctx.translate(x + w/2, y + h/2);
    ctx.rotate(-Math.PI/4);
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(-40, -12, 80, 20);
    ctx.fillStyle = b.accent;
    ctx.fillRect(-40, -12, 80, 2);
    ctx.fillRect(-40, 6, 80, 2);
    ctx.fillText(b.name, 0, 3);
    ctx.restore();
  } else if (b.special === 'fire') {
    // Mid-building
    const signY = y + h/2 - 10;
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(x-6, signY, w+12, 20);
    ctx.fillStyle = b.accent;
    ctx.fillRect(x-6, signY, w+12, 2);
    ctx.fillRect(x-6, signY+18, w+12, 2);
    ctx.fillText(b.name, x+w/2, signY+14);
  } else if (b.special === 'office') {
    // At the base of his hairline (where forehead meets hair)
    const signY = y + 28;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(x+2, signY, w-4, 18);
    ctx.fillStyle = b.accent;
    ctx.fillRect(x+2, signY, w-4, 2);
    ctx.fillRect(x+2, signY+16, w-4, 2);
    ctx.fillText(b.name, x+w/2, signY+13);
  } else {
    // Tower/High Falls - on the building face
    const signY = y + 6;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(x+4, signY, w-8, 18);
    ctx.fillStyle = b.accent;
    ctx.fillRect(x+4, signY, w-8, 2);
    ctx.fillRect(x+4, signY+16, w-8, 2);
    ctx.fillText(b.name, x+w/2, signY+13);
  }

  // Light spilling out of the doorway
  const lightColor = b.special === 'fire' ? [255, 140, 40] : [255, 220, 140];
  drawDoorLight(b.doorX, b.doorY, b.doorSide === 'top', lightColor);
}

function drawPlayer() {
  const x = Math.floor(player.x), y = Math.floor(player.y);
  const bobY = player.moving ? Math.sin(frame*0.3)*2 : 0;
  const dir = player.dir;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(x+10, y+23, 8, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // Body (red stunt suit)
  ctx.fillStyle = '#e04040';
  ctx.fillRect(x+3, y+8+bobY, 14, 10);

  // Legs
  ctx.fillStyle = '#2a2a4a';
  ctx.fillRect(x+4, y+18+bobY, 4, 5);
  ctx.fillRect(x+12, y+18+bobY, 4, 5);

  // Knee pads
  ctx.fillStyle = '#e8c170';
  ctx.fillRect(x+4, y+18+bobY, 4, 3);
  ctx.fillRect(x+12, y+18+bobY, 4, 3);

  // Arms + elbow pads
  ctx.fillStyle = '#e04040';
  ctx.fillRect(x, y+9+bobY, 3, 7);
  ctx.fillRect(x+17, y+9+bobY, 3, 7);
  ctx.fillStyle = '#e8c170';
  ctx.fillRect(x, y+12+bobY, 3, 3);
  ctx.fillRect(x+17, y+12+bobY, 3, 3);

  // Head
  ctx.fillStyle = '#f0c8a0';
  ctx.fillRect(x+5, y+1+bobY, 10, 8);

  // Helmet
  ctx.fillStyle = '#3366aa';
  ctx.fillRect(x+4, y+bobY, 12, 5);
  ctx.fillRect(x+3, y+2+bobY, 14, 3);

  // Eyes
  ctx.fillStyle = '#222';
  if (dir === 3) {} // back
  else if (dir === 1) { ctx.fillRect(x+6, y+4+bobY, 2, 2); }
  else if (dir === 2) { ctx.fillRect(x+12, y+4+bobY, 2, 2); }
  else { ctx.fillRect(x+7, y+4+bobY, 2, 2); ctx.fillRect(x+11, y+4+bobY, 2, 2); }

  // Boots
  ctx.fillStyle = '#4a2a1a';
  ctx.fillRect(x+3, y+22+bobY, 5, 3);
  ctx.fillRect(x+12, y+22+bobY, 5, 3);

  // Sunglasses (permanent after visiting coordinator)
  if (hasSunglasses && dir !== 3) {
    ctx.fillStyle = '#111';
    ctx.fillRect(x+5, y+3+bobY, 4, 3);
    ctx.fillRect(x+11, y+3+bobY, 4, 3);
    ctx.fillStyle = '#aa7722';
    ctx.fillRect(x+5, y+3+bobY, 4, 1);
    ctx.fillRect(x+11, y+3+bobY, 4, 1);
    ctx.fillRect(x+9, y+4+bobY, 2, 1);
  }

  // Return animations
  if (returnAnim && returnAnim.timer > 0) {
    returnAnim.timer--;
    const t = returnAnim.timer;

    if (returnAnim.type === 'stairfall') {
      // Stair fall - player tumbles down steps, bouncing and rolling
      if (t > 60) {
        // Actively falling down stairs - player bounces in a staircase pattern
        const fallProgress = (120 - t) / 60; // 0 to 1
        const stepNum = Math.floor(fallProgress * 5);
        const stepFrac = (fallProgress * 5) % 1;
        // Move player down and to the side in stair steps
        const bounceY = Math.abs(Math.sin(stepFrac * Math.PI)) * 8;
        player.y = player.y + 0.5; // gradually move down
        // Rotation effect
        ctx.save();
        ctx.translate(x+10, y+12);
        ctx.rotate(t * 0.25);
        // Draw motion blur lines
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          const lx = Math.sin(i * 2.1) * 12;
          const ly = Math.cos(i * 2.1) * 8;
          ctx.beginPath();
          ctx.moveTo(lx, ly);
          ctx.lineTo(lx + 6, ly + 4);
          ctx.stroke();
        }
        ctx.restore();
        // Impact dust on each "step"
        if (t % 12 < 3) {
          ctx.fillStyle = 'rgba(200,180,140,0.6)';
          ctx.beginPath();
          ctx.arc(x + 10 + Math.random()*8-4, y + 24, 3 + Math.random()*3, 0, Math.PI*2);
          ctx.fill();
        }
      } else if (t > 30) {
        // Landing hard at the bottom - impact
        const shake = Math.sin(t * 3) * 2;
        ctx.fillStyle = 'rgba(200,180,140,0.4)';
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.arc(x + 10 + Math.sin(t*0.5+i*1.5)*12, y + 22 + shake, 2+i, 0, Math.PI*2);
          ctx.fill();
        }
        // Ouch stars
        ctx.fillStyle = '#ffdb58';
        ctx.fillRect(x - 6 + shake, y - 2, 3, 3);
        ctx.fillRect(x + 20 - shake, y - 4, 3, 3);
      } else {
        // Getting up slowly, dusting off
        ctx.fillStyle = 'rgba(200,180,140,0.3)';
        for (let i = 0; i < 2; i++) {
          ctx.beginPath();
          ctx.arc(x + 5 + i*10, y + 20 + Math.sin(t*0.2)*2, 2, 0, Math.PI*2);
          ctx.fill();
        }
      }
    } else if (returnAnim.type === 'onfire') {
      // On fire! Full 5-second fire burn
      const intensity = t > 200 ? 1.0 : (t > 100 ? 0.7 : (t > 60 ? 0.4 : 0.2));
      const numFlames = Math.ceil(8 * intensity);
      for (let i = 0; i < numFlames; i++) {
        const fx = x - 6 + Math.sin(frame*0.3 + i*0.8) * 16 + 6;
        const fy = y - 2 + Math.sin(frame*0.4 + i*1.7) * 6;
        const fh = (6 + Math.sin(frame*0.2+i)*4) * intensity;
        // Color shifts from red-hot to cooling
        if (t > 200) ctx.fillStyle = '#ff2200';
        else if (t > 150) ctx.fillStyle = '#ff4400';
        else if (t > 100) ctx.fillStyle = '#ff6600';
        else if (t > 60) ctx.fillStyle = '#ff8800';
        else ctx.fillStyle = '#ffaa44';
        ctx.fillRect(fx, fy - fh, 4, fh);
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(fx+1, fy - fh + 2, 2, fh - 3);
      }
      // Embers floating up
      if (t > 100) {
        ctx.fillStyle = '#ff6600';
        for (let i = 0; i < 3; i++) {
          const ex = x + 10 + Math.sin(frame*0.1+i*2)*14;
          const ey = y - 10 - ((300-t+i*20) % 40);
          ctx.fillRect(ex, ey, 2, 2);
        }
      }
      // Smoke when dying down
      if (t < 80) {
        ctx.fillStyle = `rgba(80,80,80,${Math.min(t/80, 0.6)})`;
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.arc(x + 10 + Math.sin(frame*0.05+i)*10, y - 8 - i*8 - (80-t)*0.3, 3+i*2, 0, Math.PI*2);
          ctx.fill();
        }
      }
      // Player flashing red when on fire
      if (t > 60 && frame % 4 < 2) {
        ctx.fillStyle = 'rgba(255,50,0,0.3)';
        ctx.fillRect(x, y, 20, 24);
      }
    } else if (returnAnim.type === 'hardfall') {
      // Hard fall - screen shake and impact stars
      if (t > 60) {
        // Falling from above
        const fallOff = (t-60)*3;
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(x+10, y+25, 8+fallOff/4, 3, 0, 0, Math.PI*2);
        ctx.fill();
      } else if (t > 40) {
        // Impact - shake
        const shake = Math.sin(t*2)*3;
        ctx.fillStyle = '#ffdb58';
        ctx.fillRect(x-8+shake, y+20, 4, 4);
        ctx.fillRect(x+18-shake, y+18, 4, 4);
        ctx.fillRect(x+6, y+26+shake, 3, 3);
        // Impact lines
        ctx.fillStyle = '#fff';
        ctx.fillRect(x-6, y+22, 6, 1);
        ctx.fillRect(x+20, y+22, 6, 1);
      } else {
        // Shaking it off - dizzy stars
        ctx.fillStyle = '#ffdb58';
        const s = Math.sin(t*0.3)*8;
        ctx.fillRect(x-4+s, y-4, 3, 3);
        ctx.fillRect(x+16-s, y-6, 3, 3);
      }
    } else if (returnAnim.type === 'cool') {
      // Cool entrance - sparkle around sunglasses
      if (t > 30) {
        ctx.fillStyle = '#fff';
        const sp = Math.sin(t*0.3)*6;
        ctx.fillRect(x+2+sp, y+2+bobY, 2, 2);
        ctx.fillRect(x+16-sp, y+1+bobY, 2, 2);
        ctx.fillRect(x+10, y-2+Math.abs(sp)/2+bobY, 2, 2);
      }
    }
  }
}

    case 'mat':
      ctx.fillStyle = '#4466aa';
      ctx.fillRect(d.x,d.y,TILE*2,TILE);
      ctx.fillStyle = '#5577bb';
      ctx.fillRect(d.x+2,d.y+2,TILE*2-4,TILE-4);
      ctx.fillStyle = '#4466aa';
      ctx.fillRect(d.x+TILE,d.y,2,TILE);
      break;
    case 'lamp':
      ctx.fillStyle = '#555';
      ctx.fillRect(d.x+6,d.y+6,4,20);
      ctx.fillStyle = '#666';
      ctx.fillRect(d.x+4,d.y+24,8,4);
      ctx.fillStyle = '#ffcc44';
      ctx.fillRect(d.x+3,d.y+2,10,6);
      ctx.fillStyle = 'rgba(255,220,100,0.12)';
      ctx.beginPath();
      ctx.arc(d.x+8,d.y+5,14+Math.sin(frame*0.05)*2,0,Math.PI*2);
      ctx.fill();
      break;
    case 'gate':
      // Iron gate at the exit
      // Gate posts
      ctx.fillStyle = '#555';
      ctx.fillRect(d.x-2, d.y-4, 6, TILE*4+8);
      ctx.fillRect(d.x+20, d.y-4, 6, TILE*4+8);
      // Post tops (spheres)
      ctx.fillStyle = '#777';
      ctx.fillRect(d.x-3, d.y-8, 8, 5);
      ctx.fillRect(d.x+19, d.y-8, 8, 5);
      // Iron bars
      ctx.fillStyle = '#444';
      for (let i=0;i<4;i++) {
        ctx.fillRect(d.x+4+i*5, d.y, 2, TILE*4);
      }
      // Horizontal cross bars
      ctx.fillStyle = '#555';
      ctx.fillRect(d.x, d.y+10, 24, 3);
      ctx.fillRect(d.x, d.y+TILE*2, 24, 3);
      ctx.fillRect(d.x, d.y+TILE*3+6, 24, 3);
      // Chain and lock
      ctx.fillStyle = '#aa8833';
      ctx.fillRect(d.x+8, d.y+TILE*2-2, 8, 6);
      ctx.fillStyle = '#887722';
      ctx.fillRect(d.x+10, d.y+TILE*2, 4, 3);
      break;
  }
}

// ---- HIGH SCORES ----
const HS_API = 'https://stunt-scores.vercel.app/api/scores';

const highScoreGames = [
  { key: 'stairfalls', name: 'STAIR FALLS' },
  { key: 'fireburns', name: 'FIRE BURNS' },
  { key: 'highfalls', name: 'HIGH FALLS' },
  { key: 'stuntcoord', name: 'STUNT COORD' }
];

const hsTabs = [
  { key: 'stairfalls', label: 'STAIRS', fullLabel: 'STAIR FALLS' },
  { key: 'fireburns', label: 'FIRE', fullLabel: 'FIRE BURNS' },
  { key: 'highfalls', label: 'FALLS', fullLabel: 'HIGH FALLS' },
  { key: 'stuntcoord', label: 'COORD', fullLabel: 'STUNT COORD' },
  { key: 'overall', label: 'OVERALL', fullLabel: 'OVERALL' }
];

let hsCache = {}; // { gameKey: [{name, score}] }
let hsFetching = false;

async function fetchAllScores() {
  // Try API first, fall back to localStorage
  try {
    const res = await fetch(HS_API);
    if (res.ok) {
      const data = await res.json();
      // API returns { stairfalls: [...], fireburns: [...], ... }
      for (const g of highScoreGames) {
        hsCache[g.key] = (data[g.key] || []).sort((a,b) => b.score - a.score).slice(0, 10);
      }
      return;
    }
  } catch(e) {}
  // Fallback: localStorage
  for (const g of highScoreGames) {
    try {
      const d = localStorage.getItem(g.key + '_highscores');
      hsCache[g.key] = d ? JSON.parse(d).sort((a,b) => b.score - a.score).slice(0, 10) : [];
    } catch(e) { hsCache[g.key] = []; }
  }
}

function computeOverallScores() {
  // Placement-based scoring: 1st place = 10pts, 2nd = 9pts, ... 10th = 1pt
  // Each game's placement points are multiplied by the game's weight
  // Final score = total weighted placement points
  const playerScores = {}; // { name: { total: 0, gamesPlayed: 0 } }
  for (const g of highScoreGames) {
    const scores = (hsCache[g.key] || []).sort((a,b) => b.score - a.score);
    // Only top 10 get placement points
    const ranked = scores.slice(0, 10);
    for (let i = 0; i < ranked.length; i++) {
      const n = ranked[i].name || 'Anonymous';
      if (!playerScores[n]) playerScores[n] = { total: 0, gamesPlayed: 0 };
      if (!playerScores[n]['_' + g.key]) {
        const placementPts = 10 - i; // 1st=10, 2nd=9, ..., 10th=1
        playerScores[n].total += placementPts;
        playerScores[n].gamesPlayed++;
        playerScores[n]['_' + g.key] = true;
      }
    }
  }
  return Object.entries(playerScores)
    .map(([name, d]) => ({
      name,
      score: d.total,
      games: d.gamesPlayed
    }))
    .sort((a, b) => b.score - a.score || b.games - a.games);
}

// Player identity for highlighting
const playerName = localStorage.getItem('stuntschool_playername') || '';
const playerUserId = localStorage.getItem('stuntschool_userid') || '';

function isYouScore(s) {
  if (playerUserId && s.userId) return s.userId === playerUserId;
  if (playerName && s.name) return s.name.toLowerCase() === playerName.toLowerCase();
  return false;
}

function renderHSPanel(tabIdx) {
  const panels = document.getElementById('hs-panels');
  const tab = hsTabs[tabIdx];
  let allScores, isOverall = tab.key === 'overall';
  if (isOverall) {
    allScores = computeOverallScores();
  } else {
    allScores = (hsCache[tab.key] || []).sort((a,b) => b.score - a.score);
  }
  const top10 = allScores.slice(0, 10);
  let html = '<div class="hs-game-header">' + (tab.fullLabel || tab.label) + '</div>';
  if (top10.length === 0) {
    html += '<div class="hs-empty">No scores yet - go play!</div>';
  } else {
    html += '<div class="hs-scores">';
    for (let i = 0; i < top10.length; i++) {
      const s = top10[i];
      const name = s.name || 'Anonymous';
      const val = s.score != null ? (isOverall ? s.score + ' pts' : s.score.toLocaleString()) : '---';
      const youMatch = isYouScore(s);
      const youClass = youMatch ? ' hs-you' : '';
      const youTag = youMatch ? ' <span style="color:#7ec8e3;font-size:10px;">(YOU)</span>' : '';
      const extra = isOverall && s.games ? ' <span style="color:#555;font-size:10px;">(' + s.games + '/4)</span>' : '';
      html += '<div class="hs-row' + youClass + '"><span class="hs-rank">' + (i+1) + '.</span><span class="hs-name">' + name + youTag + extra + '</span><span class="hs-val">' + val + '</span></div>';
    }
    html += '</div>';
  }
  // Show player's rank if they're not in top 10
  const hasIdentity = playerUserId || playerName;
  if (hasIdentity && allScores.length > 0) {
    const inTop10 = top10.some(s => isYouScore(s));
    if (!inTop10) {
      const idx = allScores.findIndex(s => isYouScore(s));
      if (idx >= 0) {
        const s = allScores[idx];
        html += '<div class="hs-scores" style="margin-top:6px;border-top:1px solid rgba(126,200,227,0.2);padding-top:6px;">';
        const youVal = isOverall ? s.score + ' pts' : s.score.toLocaleString();
        html += '<div class="hs-row hs-you"><span class="hs-rank">' + (idx+1) + '.</span><span class="hs-name">' + s.name + ' <span style="color:#7ec8e3;font-size:10px;">(YOU)</span></span><span class="hs-val">' + youVal + '</span></div>';
        html += '</div>';
      }
    }
  }
  if (isOverall) {
    html += '<div style="color:#666;font-size:10px;text-align:center;padding:12px 8px 0;line-height:1.5;">'
      + 'Points are earned by placing in the top 10 of each game.<br>'
      + '1st place = 10 pts, 2nd = 9 pts, down to 10th = 1 pt.<br>'
      + 'Max score is 40 pts. Play all 4 to rank highest!'
      + '</div>';
  }
  document.getElementById('hs-footer').textContent = '';
  panels.innerHTML = html;
}

function switchHSTab(idx) {
  hsActiveTab = idx;
  const tabs = document.querySelectorAll('.hs-tab');
  tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
  renderHSPanel(idx);
}

async function openHighScores() {
  highScoreActive = true;
  hsActiveTab = 0;
  const box = document.getElementById('highscore-box');

  // Build tabs
  const tabsEl = document.getElementById('hs-tabs');
  tabsEl.innerHTML = hsTabs.map((t, i) =>
    '<div class="hs-tab' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">' + t.label + '</div>'
  ).join('');
  tabsEl.querySelectorAll('.hs-tab').forEach(tab => {
    tab.addEventListener('click', (e) => {
      e.stopPropagation();
      switchHSTab(parseInt(tab.dataset.idx));
    });
  });

  // Close button
  document.getElementById('hs-close').onclick = (e) => {
    e.stopPropagation();
    closeHighScores();
  };

  document.getElementById('hs-panels').innerHTML = '<div class="hs-empty">Loading...</div>';
  document.getElementById('hs-footer').textContent = '';
  box.style.display = 'block';

  // Fetch scores then render
  await fetchAllScores();
  renderHSPanel(hsActiveTab);
}

function closeHighScores() {
  highScoreActive = false;
  document.getElementById('highscore-box').style.display = 'none';
}
