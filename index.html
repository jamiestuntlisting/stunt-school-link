<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Virtual Stunt School</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #111;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: monospace;
  image-rendering: pixelated;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
#game-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 9/16;
  max-height: 100dvh;
}
canvas {
  image-rendering: pixelated;
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 4px;
}
#ui-overlay {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 10;
  width: 90%;
}
#dialogue-box {
  display: none;
  background: rgba(0,0,20,0.94);
  border: 3px solid #e8c170;
  border-radius: 8px;
  padding: 14px 16px;
  color: #f0e6d0;
  font-size: 14px;
  line-height: 1.5;
  text-align: left;
  box-shadow: 0 0 20px rgba(0,0,0,0.7);
}
#dialogue-box .npc-name {
  color: #e8c170; font-weight: bold; margin-bottom: 4px; font-size: 13px;
}
#dialogue-box .dialogue-text { color: #f0e6d0; white-space: pre-line; }
#dialogue-box .prompt { color: #888; font-size: 11px; margin-top: 6px; }
#enter-prompt {
  display: none;
  background: rgba(0,0,20,0.88);
  border: 2px solid #7ec8e3;
  border-radius: 6px;
  padding: 8px 14px;
  color: #7ec8e3;
  font-size: 13px;
  text-align: center;
  margin-top: 6px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
#title-screen {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: #1a1a1a;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 100;
  animation: splashOut 1.2s ease-in 4s forwards;
}
@keyframes splashOut { from { opacity: 1; } to { opacity: 0; } }
#title-screen h1 {
  font-family: monospace; font-size: 36px; color: #e8c170;
  text-shadow: 3px 3px 0 #8b4513, 0 0 20px rgba(232,193,112,0.3);
  margin-bottom: 6px; text-align: center;
  opacity: 0;
  animation: textIn 1.5s ease-out 0.8s forwards;
}
#title-screen h2 {
  font-family: monospace; font-size: 16px; color: #7ec8e3;
  font-weight: normal;
  opacity: 0;
  animation: textIn 1.5s ease-out 1.4s forwards;
}
@keyframes textIn { from { opacity: 0; } to { opacity: 1; } }
#music-btn {
  position: absolute; top: 8px; right: 8px; z-index: 50;
  background: rgba(0,0,20,0.8); border: 2px solid #e8c170;
  color: #e8c170; font-family: monospace; font-size: 12px;
  padding: 4px 10px; border-radius: 4px; cursor: pointer;
}
/* Joystick (right side) */
#joystick-area {
  position: absolute;
  bottom: 16px; right: 16px;
  width: 120px; height: 120px;
  z-index: 20;
  display: none;
  -webkit-tap-highlight-color: transparent;
}
#joystick-area canvas {
  width: 120px; height: 120px;
  border-radius: 50%;
}
/* Action button (left side) */
#touch-action-btn {
  position: absolute;
  bottom: 40px; left: 20px;
  width: 64px; height: 64px;
  background: rgba(126,200,227,0.3);
  border: 2px solid rgba(126,200,227,0.6);
  border-radius: 50%;
  color: rgba(126,200,227,0.9);
  font-family: monospace; font-size: 12px; font-weight: bold;
  z-index: 20;
  display: none;
  align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>

<div id="title-screen">
  <h1>VIRTUAL STUNT SCHOOL</h1>
  <h2>A Stunt Person's Journey</h2>
</div>

<div id="game-wrapper">
  <canvas id="game"></canvas>
  <div id="ui-overlay">
    <div id="dialogue-box">
      <div class="npc-name" id="npc-name"></div>
      <div class="dialogue-text" id="dialogue-text"></div>
      <div class="prompt" id="dialogue-prompt"></div>
    </div>
    <div id="enter-prompt"></div>
  </div>
  <button id="music-btn" style="display:none;">Music: ON</button>
  <div id="joystick-area"><canvas id="joystick-canvas" width="120" height="120"></canvas></div>
  <div id="touch-action-btn">ACT</div>
</div>

<script>
// ============================================================
// STUNT SCHOOL - A Top-Down Zelda-like Adventure
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Vertical phone aspect ratio: 9:16
const W = 360, H = 640;
canvas.width = W;
canvas.height = H;
const TILE = 32;

// Detect touch device
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// ---- MUSIC ENGINE (Web Audio chiptune) ----
let audioCtx = null;
let musicPlaying = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playNote(freq, start, dur, type='triangle', vol=0.06) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + start);
  osc.stop(audioCtx.currentTime + start + dur);
}

function playMusic() {
  if (!audioCtx) initAudio();
  musicPlaying = true;
  document.getElementById('music-btn').textContent = 'Music: ON';

  // Original high-energy arena rock chiptune
  const BPM = 130;
  const beat = 60 / BPM;
  const sixteenth = beat / 4;

  // Driving rock riff - original composition
  const riff = [
    // Bar 1: power riff
    [165,0],[165,beat*0.5],[220,beat],[196,beat*1.5],[165,beat*2],[147,beat*2.5],[165,beat*3],[196,beat*3.5],
    // Bar 2: climb up
    [220,beat*4],[220,beat*4.5],[262,beat*5],[294,beat*5.5],[330,beat*6],[294,beat*6.5],[262,beat*7],[220,beat*7.5],
    // Bar 3: power riff variation
    [196,beat*8],[196,beat*8.5],[262,beat*9],[247,beat*9.5],[220,beat*10],[196,beat*10.5],[220,beat*11],[247,beat*11.5],
    // Bar 4: resolve
    [262,beat*12],[262,beat*12.5],[330,beat*13],[294,beat*13.5],[262,beat*14],[220,beat*14.5],[196,beat*15],[165,beat*15.5],
  ];

  // Heavy bass line
  const bass = [
    [82,0,beat*2],[73,beat*2,beat*2],[82,beat*4,beat*2],[98,beat*6,beat*2],
    [82,beat*8,beat*2],[73,beat*10,beat*2],[98,beat*12,beat*2],[82,beat*14,beat*2],
  ];

  // Power chords
  const chords = [
    [[165,220,330],0,beat*2],[[147,196,294],beat*2,beat*2],
    [[165,220,330],beat*4,beat*2],[[196,262,392],beat*6,beat*2],
    [[165,220,330],beat*8,beat*2],[[147,196,294],beat*10,beat*2],
    [[196,262,392],beat*12,beat*2],[[165,220,330],beat*14,beat*2],
  ];

  const loopLen = beat * 16;

  function scheduleLoop() {
    if (!musicPlaying) return;
    // Lead riff - square wave for that rock edge
    riff.forEach(([f,t]) => playNote(f,t,beat*0.4,'square',0.04));
    // Bass - heavy sine
    bass.forEach(([f,t,d]) => playNote(f,t,d,'sawtooth',0.035));
    // Power chords - distorted feel
    chords.forEach(([fs,t,d]) => fs.forEach(f => playNote(f,t,d,'square',0.015)));
    // Driving drums - eighth note kick/snare pattern
    for (let i = 0; i < 16; i++) {
      const t = beat * i;
      // Kick on 1 and 3
      if (i % 2 === 0) playNote(55,t,0.08,'sine',0.06);
      // Snare on 2 and 4
      if (i % 2 === 1) playNote(200,t,0.05,'square',0.03);
      // Hi-hat every eighth
      playNote(800,t,0.02,'square',0.012);
      playNote(800,t+beat*0.5,0.02,'square',0.008);
    }
    setTimeout(scheduleLoop, loopLen * 1000);
  }
  scheduleLoop();
}

function stopMusic() {
  musicPlaying = false;
  document.getElementById('music-btn').textContent = 'Music: OFF';
}

document.getElementById('music-btn').addEventListener('click', () => {
  if (musicPlaying) stopMusic(); else playMusic();
});

// ---- GAME STATE ----
let gameStarted = false;
let dialogueActive = false;
let currentDialogue = null;
let dialogueIndex = 0;
let nearBuilding = null;
let nearNPC = null;
let frame = 0;
const npcTalkCount = {}; // tracks which round each NPC is on

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'e' || e.key === 'E') {
    e.preventDefault();
    handleAction();
  }
});
window.addEventListener('keyup', e => keys[e.key] = false);

function handleAction() {
  if (dialogueActive) {
    dialogueIndex++;
    const round = npcTalkCount[currentDialogue.name] || 0;
    if (dialogueIndex >= currentDialogue.rounds[round].length) {
      npcTalkCount[currentDialogue.name] = (round + 1) % currentDialogue.rounds.length;
      closeDialogue();
    } else {
      showDialogueLine();
    }
  } else if (nearNPC) {
    openDialogue(nearNPC);
  }
}

// ---- TOUCH CONTROLS (Omnidirectional Joystick) ----
const joystick = { x: 0, y: 0, active: false }; // -1 to 1 range
let joystickTouchId = null;

function setupTouch() {
  if (!isTouchDevice) return;
  document.getElementById('joystick-area').style.display = 'block';
  document.getElementById('touch-action-btn').style.display = 'flex';

  const jArea = document.getElementById('joystick-area');
  const jCanvas = document.getElementById('joystick-canvas');
  const jCtx = jCanvas.getContext('2d');
  const jR = 60; // radius of outer ring
  const knobR = 22; // radius of thumb knob

  function drawJoystick() {
    jCtx.clearRect(0, 0, 120, 120);
    // Outer ring
    jCtx.beginPath();
    jCtx.arc(60, 60, jR-2, 0, Math.PI*2);
    jCtx.fillStyle = 'rgba(232,193,112,0.12)';
    jCtx.fill();
    jCtx.strokeStyle = 'rgba(232,193,112,0.35)';
    jCtx.lineWidth = 2;
    jCtx.stroke();
    // Inner knob
    const kx = 60 + joystick.x * (jR - knobR);
    const ky = 60 + joystick.y * (jR - knobR);
    jCtx.beginPath();
    jCtx.arc(kx, ky, knobR, 0, Math.PI*2);
    jCtx.fillStyle = joystick.active ? 'rgba(232,193,112,0.5)' : 'rgba(232,193,112,0.25)';
    jCtx.fill();
    jCtx.strokeStyle = 'rgba(232,193,112,0.6)';
    jCtx.lineWidth = 2;
    jCtx.stroke();
    requestAnimationFrame(drawJoystick);
  }
  drawJoystick();

  function getJoystickPos(touch) {
    const rect = jArea.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = (touch.clientX - cx) / (rect.width / 2);
    let dy = (touch.clientY - cy) / (rect.height / 2);
    // Clamp to circle
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 1) { dx /= dist; dy /= dist; }
    return { x: dx, y: dy };
  }

  jArea.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystickTouchId = touch.identifier;
    const pos = getJoystickPos(touch);
    joystick.x = pos.x;
    joystick.y = pos.y;
    joystick.active = true;
  }, {passive:false});

  jArea.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        const pos = getJoystickPos(touch);
        joystick.x = pos.x;
        joystick.y = pos.y;
      }
    }
  }, {passive:false});

  function releaseJoystick(e) {
    for (const touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        joystick.x = 0; joystick.y = 0;
        joystick.active = false;
        joystickTouchId = null;
      }
    }
  }
  jArea.addEventListener('touchend', releaseJoystick, {passive:false});
  jArea.addEventListener('touchcancel', releaseJoystick, {passive:false});

  // Action button (left side)
  document.getElementById('touch-action-btn').addEventListener('touchstart', e => {
    e.preventDefault(); handleAction();
  }, {passive:false});
}

// Auto-start after splash fades (splash fades in 1.5s, holds, fades out at 3.5s over 1.2s)
function startGame() {
  if (gameStarted) return;
  gameStarted = true;
  const title = document.getElementById('title-screen');
  title.style.display = 'none';
  document.getElementById('music-btn').style.display = 'block';
  setupTouch();
}

// Auto-start after splash fades out (4s delay + 1.2s fade = 5.2s)
setTimeout(startGame, 5200);

// Also allow tap/click/key to skip the splash early
function skipSplash() {
  if (gameStarted) return;
  initAudio();
  playMusic();
  startGame();
}
document.getElementById('title-screen').addEventListener('click', skipSplash);
document.getElementById('title-screen').addEventListener('touchstart', e => { e.preventDefault(); skipSplash(); }, {passive:false});
window.addEventListener('keydown', function splashKey(e) {
  if (!gameStarted) { skipSplash(); window.removeEventListener('keydown', splashKey); }
});
// Start music on first interaction after auto-start
document.addEventListener('click', function firstClick() {
  if (gameStarted && !musicPlaying) { initAudio(); playMusic(); }
  document.removeEventListener('click', firstClick);
}, {once:true});
document.addEventListener('touchstart', function firstTouch() {
  if (gameStarted && !musicPlaying) { initAudio(); playMusic(); }
  document.removeEventListener('touchstart', firstTouch);
}, {once:true});

// ---- PLAYER ----
let enteringBuilding = false; // locks controls when walking into a door

// Spawn position: check localStorage for returning from a building
function getSpawnPos() {
  const lastBuilding = localStorage.getItem('stuntschool_lastbuilding');
  if (lastBuilding) {
    localStorage.removeItem('stuntschool_lastbuilding');
    // Spawn outside the door of the building they just visited
    const spawns = {
      'stairfalls': { x: 3 * TILE, y: 5.5 * TILE, dir: 0 },
      'fireburns':  { x: 8 * TILE, y: 5.5 * TILE, dir: 0 },
      'highfalls':  { x: 3 * TILE, y: 13.5 * TILE, dir: 3 },
      'stuntcoord': { x: 8 * TILE, y: 13.5 * TILE, dir: 3 }
    };
    if (spawns[lastBuilding]) return spawns[lastBuilding];
  }
  return { x: 5.5 * TILE, y: 10.5 * TILE, dir: 0 };
}
const spawn = getSpawnPos();

const player = {
  x: spawn.x, y: spawn.y,
  w: 20, h: 24,
  speed: 2.2,
  dir: spawn.dir || 0, animFrame: 0, animTimer: 0, moving: false
};

// ---- MAP ----
// Map sized for vertical layout: 11 wide x 20 tall
const MAP_W = 11, MAP_H = 20;
const map = [];
for (let y = 0; y < MAP_H; y++) {
  map[y] = [];
  for (let x = 0; x < MAP_W; x++) {
    if (y === 0 || y === MAP_H-1 || x === 0 || x === MAP_W-1) map[y][x] = 2;
    else map[y][x] = 0;
  }
}

function setTile(x, y, t) { if (map[y] && map[y][x] !== undefined) map[y][x] = t; }

// Main cross-shaped path
for (let y = 1; y < MAP_H-1; y++) { setTile(5, y, 1); setTile(6, y, 1); }
for (let x = 1; x < MAP_W-1; x++) { setTile(x, 10, 1); setTile(x, 11, 1); }
// Paths to corners
for (let x = 1; x < 5; x++) { setTile(x, 4, 1); setTile(x, 16, 1); }
for (let x = 7; x < 10; x++) { setTile(x, 4, 1); setTile(x, 16, 1); }

// EXIT on the right side - open the wall
map[10][MAP_W-1] = 1;
map[11][MAP_W-1] = 1;

// Water pond
setTile(2, 8, 3); setTile(3, 8, 3); setTile(2, 9, 3); setTile(3, 9, 3);

// Flowers
setTile(8, 8, 4); setTile(9, 9, 4); setTile(1, 12, 4); setTile(2, 13, 4);
setTile(8, 12, 4); setTile(9, 13, 4); setTile(1, 7, 4);

// Dark grass
setTile(8, 6, 5); setTile(9, 7, 5); setTile(1, 14, 5); setTile(2, 14, 5);

// ---- BUILDINGS in corners (SWAPPED: Stair Falls top-left, High Falls bottom-left) ----
const buildings = [
  {
    name: 'STAIR FALLS',
    x: 1, y: 1, w: 4, h: 3,
    doorX: 3, doorY: 4, doorSide: 'bottom',
    url: 'https://pro-stair-faller.vercel.app/',
    color: '#6b5b45', roofColor: '#4a3f30', accent: '#c4a76c',
    special: 'stairs'
  },
  {
    name: 'FIRE BURNS',
    x: 7, y: 1, w: 3, h: 3,
    doorX: 8, doorY: 4, doorSide: 'bottom',
    url: 'https://pro-fire-burner.vercel.app/',
    color: '#8b2500', roofColor: '#5c1a00', accent: '#ff6b35',
    special: 'fire'
  },
  {
    name: 'HIGH FALLS',
    x: 1, y: 15, w: 4, h: 4,
    doorX: 3, doorY: 15, doorSide: 'top',
    url: 'https://pro-high-faller.vercel.app/',
    color: '#4a6fa5', roofColor: '#2c4a7c', accent: '#7ec8e3',
    special: 'tower'
  },
  {
    name: 'STUNT COORD',
    x: 7, y: 15, w: 3, h: 4,
    doorX: 8, doorY: 15, doorSide: 'top',
    url: 'https://coordinator-please.vercel.app/',
    color: '#2d5a27', roofColor: '#1a3d16', accent: '#90c948',
    special: 'office'
  }
];

// Exit zone check - when player walks off right edge
const EXIT_URL = null; // set to a URL if you want the exit to go somewhere

// ---- NPCs ----
// Each NPC has 3 rounds of dialogue that cycle
const npcs = [
  {
    name: 'Injured Ian',
    x: 3 * TILE + 8, y: 10 * TILE + 8,
    w: 28, h: 16,
    type: 'lying',
    rounds: [

      [

      [

      ]
    ]
  },
  {

    x: 7 * TILE + 8, y: 7 * TILE,
    w: 24, h: 28,
    type: 'old',
    rounds: [
      [
        "Back in my day, we didn't have\nair bags. We had DIRT.",

      ]
    ]
  },
  {
    name: 'Jittery Jeff',
    x: 2 * TILE, y: 6 * TILE,
    w: 24, h: 28,
    type: 'jittery',
    rounds: [
      [
        "*vibrating* HAVE YOU TRIED THE\nSTAIR FALLS BUILDING YET?!",

    ]
  },

      ]
    ]
  },

// ---- COLLISION ----
function isBlocked(px, py, pw, ph) {
  const left = Math.floor(px / TILE);
  const right = Math.floor((px + pw - 1) / TILE);
  const top = Math.floor(py / TILE);
  const bottom = Math.floor((py + ph - 1) / TILE);
  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (ty < 0 || ty >= MAP_H || tx < 0 || tx >= MAP_W) return true;
      if (map[ty][tx] === 2 || map[ty][tx] === 3) return true;
    }
  }
  for (const b of buildings) {
    const bx1 = b.x * TILE, by1 = b.y * TILE;
    const bx2 = (b.x + b.w) * TILE, by2 = (b.y + b.h) * TILE;
    if (px + pw > bx1 && px < bx2 && py + ph > by1 && py < by2) {
      // Allow walking through the open doorway
      const doorCx = b.doorX * TILE;
      const doorCy = b.doorY * TILE;
      const pcx = px + pw/2;
      const pcy = py + ph/2;
      if (Math.abs(pcx - doorCx) < 14 && Math.abs(pcy - doorCy) < 20) {
        continue; // door zone - don't block
      }
      return true;
    }
  }
  return false;
}

// ---- DIALOGUE ----
function openDialogue(npc) {
  dialogueActive = true;
  currentDialogue = npc;
  dialogueIndex = 0;
  showDialogueLine();
}
function showDialogueLine() {
  const box = document.getElementById('dialogue-box');
  const round = npcTalkCount[currentDialogue.name] || 0;
  const lines = currentDialogue.rounds[round];
  document.getElementById('npc-name').textContent = currentDialogue.name;
  document.getElementById('dialogue-text').textContent = lines[dialogueIndex];
  document.getElementById('dialogue-prompt').textContent =
    dialogueIndex < lines.length - 1
      ? (isTouchDevice ? 'Tap to continue...' : 'Press SPACE for more...')
      : (isTouchDevice ? 'Tap to close' : 'Press SPACE to close');
  box.style.display = 'block';
}
function closeDialogue() {
  dialogueActive = false;
  currentDialogue = null;
  document.getElementById('dialogue-box').style.display = 'none';
}

// ---- DRAWING ----
function drawTile(tx, ty) {
  const x = tx * TILE, y = ty * TILE;
  const tile = map[ty][tx];
  switch(tile) {
    case 0:
      ctx.fillStyle = '#4a8c3f';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#56a044';
      if ((tx+ty)%3===0) { ctx.fillRect(x+4,y+8,2,4); ctx.fillRect(x+20,y+18,2,4); }
      if ((tx+ty)%5===0) ctx.fillRect(x+14,y+4,2,3);
      break;
    case 1:
      ctx.fillStyle = '#c4a76c';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#b89a5f';
      if ((tx+ty)%2===0) { ctx.fillRect(x+6,y+6,4,4); ctx.fillRect(x+20,y+22,3,3); }
      break;
    case 2:
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#6b5a4a';
      ctx.fillRect(x+2,y+2,TILE-4,TILE-4);
      ctx.fillStyle = '#4a3a2a';
      ctx.fillRect(x+14,y,4,TILE);
      ctx.fillRect(x,y+14,TILE,4);
      break;
    case 3:
      ctx.fillStyle = '#2a6fc4';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#3a7fd4';
      const wo = Math.sin(frame*0.05+tx+ty)*3;
      ctx.fillRect(x+4+wo,y+8,12,2);
      ctx.fillRect(x+10-wo,y+20,10,2);
      break;
    case 4:
      ctx.fillStyle = '#4a8c3f';
      ctx.fillRect(x, y, TILE, TILE);
      const cols = ['#ff6b8a','#ffdb58','#ff8c42','#c990ff'];
      for (let i=0;i<3;i++) {
        ctx.fillStyle = cols[(tx*3+ty*7+i)%cols.length];
        ctx.fillRect(x+4+i*10+((tx+i)%3), y+6+((ty+i*5)%16), 4, 4);
        ctx.fillStyle = '#56a044';
        ctx.fillRect(x+5+i*10+((tx+i)%3), y+10+((ty+i*5)%16), 2, 4);
      }
      break;
    case 5:
      ctx.fillStyle = '#3a7030';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#2f6028';
      ctx.fillRect(x+8,y+4,3,5); ctx.fillRect(x+18,y+16,3,5);
      break;
  }
}

function drawBuilding(b) {
  const x = b.x*TILE, y = b.y*TILE, w = b.w*TILE, h = b.h*TILE;
  const doorAtTop = b.doorSide === 'top';

  // Each building has a completely unique look
  switch(b.special) {

    case 'tower': {
      // HIGH FALLS: Scaffolding structure with a big ladder
      const scaffH = h + 60; // tall scaffolding
      const scaffTop = y - 60;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(x+4, scaffTop+4, w, scaffH);

      // Ground/base platform
      ctx.fillStyle = '#888';
      ctx.fillRect(x-4, y+h-4, w+8, 6);

      // Scaffolding vertical poles (metal grey)
      ctx.fillStyle = '#889';
      ctx.fillRect(x+2, scaffTop, 4, scaffH); // left pole
      ctx.fillRect(x+w-6, scaffTop, 4, scaffH); // right pole
      ctx.fillRect(x+w/2-2, scaffTop, 4, scaffH); // center pole
      // Darker side for depth
      ctx.fillStyle = '#667';
      ctx.fillRect(x+4, scaffTop, 2, scaffH);
      ctx.fillRect(x+w-4, scaffTop, 2, scaffH);

      // Horizontal platforms every ~16px
      for (let i=0;i<8;i++) {
        const py = scaffTop + 8 + i*10;
        // Platform planks (wood)
        ctx.fillStyle = '#a08050';
        ctx.fillRect(x, py, w, 4);
        ctx.fillStyle = '#8a7040';
        ctx.fillRect(x, py+3, w, 1);
        // Cross bracing (X pattern between platforms)
        if (i < 7) {
          ctx.fillStyle = '#778';
          // Left X brace
          for (let j=0;j<8;j++) {
            ctx.fillRect(x+2+j*2, py+4+j, 2, 1);
            ctx.fillRect(x+w/2-4-j*2, py+4+j, 2, 1);
          }
          // Right X brace
          for (let j=0;j<8;j++) {
            ctx.fillRect(x+w/2+j*2, py+4+j, 2, 1);
            ctx.fillRect(x+w-4-j*2, py+4+j, 2, 1);
          }
        }
      }

      // BIG LADDER on the right side
      const lx = x+w-14;
      // Ladder rails
      ctx.fillStyle = '#bb8830';
      ctx.fillRect(lx, scaffTop-4, 3, scaffH+8);
      ctx.fillRect(lx+10, scaffTop-4, 3, scaffH+8);
      // Ladder rungs
      ctx.fillStyle = '#cc9940';
      for (let i=0;i<14;i++) {
        ctx.fillRect(lx+2, scaffTop+i*6, 9, 2);
      }

      // Safety net at bottom
      ctx.fillStyle = '#4466cc';
      ctx.fillRect(x+4, y+h-16, w-8, 10);
      ctx.fillStyle = '#5577dd';
      ctx.fillRect(x+6, y+h-14, w-12, 6);
      // Net pattern
      ctx.fillStyle = '#4466cc';
      for (let i=0;i<5;i++) ctx.fillRect(x+8+i*8, y+h-14, 1, 6);

      // Height markers
      ctx.fillStyle = '#ffcc44';
      ctx.font = '6px monospace';
      ctx.textAlign = 'right';
      for (let i=0;i<5;i++) {
        const my = scaffTop + 10 + i*16;
        ctx.fillRect(x-2, my, 6, 1);
        ctx.fillText(`${80-i*20}'`, x-4, my+3);
      }

      // Warning tape at base
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(x-6, y+h, w+12, 3);
      ctx.fillStyle = '#222';
      for (let i=0;i<8;i++) ctx.fillRect(x-6+i*7, y+h, 3, 3);

      // Open doorway (gap in scaffolding base)
      const dy1 = doorAtTop ? y-4 : y+h-12;
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(x+w/2-8, dy1, 16, 14);
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(x+w/2-6, dy1+2, 12, 10);
      ctx.fillStyle = '#889';
      ctx.fillRect(x+w/2-9, dy1, 2, 14);
      ctx.fillRect(x+w/2+7, dy1, 2, 14);
      ctx.fillRect(x+w/2-9, dy1, 18, 2);
      break;
    }

    case 'fire': {
      // FIRE BURNS: ENGULFED in fire - barely visible building under massive flames
      // Heat glow on ground around building
      ctx.fillStyle = 'rgba(255,60,0,0.08)';
      ctx.fillRect(x-16, y-10, w+32, h+24);
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(x+3, y+3, w, h);
      // Charred building body (barely visible under flames)
      ctx.fillStyle = '#2a0a00';
      ctx.fillRect(x, y, w, h);
      // Scorched brick pattern
      ctx.fillStyle = '#3a1508';
      for (let by=0;by<h;by+=6) for (let bx=0;bx<w;bx+=8) {
        ctx.fillRect(x+bx+((by/6)%2)*4, y+by, 7, 5);
      }
      // Glowing windows (fire inside)
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(x+4, y+8, 10, 10);
      ctx.fillRect(x+w-14, y+10, 10, 10);
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(x+6, y+10, 6, 6);
      ctx.fillRect(x+w-12, y+12, 6, 6);
      ctx.fillStyle = '#ffee88';
      ctx.fillRect(x+7, y+11, 4, 4);
      ctx.fillRect(x+w-11, y+13, 4, 4);

      // MASSIVE FLAMES - roof, sides, everywhere
      // Roof inferno (10 flame columns)
      for (let i=0;i<10;i++) {
        const fx = x - 4 + i*(w+8)/10;
        const phase = i*1.3+frame*0.14;
        const fh = 18 + Math.sin(phase)*10 + Math.sin(phase*1.7)*5;
        const fh2 = 14 + Math.sin(phase*1.3+1)*7;
        const fh3 = 8 + Math.sin(phase*1.8+2)*5;
        ctx.fillStyle = '#aa1100';
        ctx.fillRect(fx-1, y-fh-4, 12, fh+8);
        ctx.fillStyle = '#dd2200';
        ctx.fillRect(fx+1, y-fh, 8, fh+4);
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(fx+2, y-fh2-2, 6, fh2+4);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(fx+3, y-fh3, 4, fh3+2);
        ctx.fillStyle = '#ffdd44';
        ctx.fillRect(fx+3, y-fh3-2, 3, 4);
        ctx.fillStyle = '#fff8cc';
        ctx.fillRect(fx+4, y-fh3-4, 2, 3);
      }
      // LEFT SIDE wall of flames
      for (let i=0;i<4;i++) {
        const fy = y + 4 + i*(h/4);
        const fw = 8 + Math.sin(frame*0.16+i*2)*5;
        ctx.fillStyle = '#dd2200';
        ctx.fillRect(x-fw, fy, fw+4, 14);
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(x-fw+2, fy+2, fw-2, 10);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(x-fw+4, fy+4, fw-6, 6);
      }
      // RIGHT SIDE wall of flames
      for (let i=0;i<4;i++) {
        const fy = y + 2 + i*(h/4);
        const fw = 8 + Math.sin(frame*0.18+i*1.7+1)*5;
        ctx.fillStyle = '#dd2200';
        ctx.fillRect(x+w-4, fy, fw+4, 14);
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(x+w-2, fy+2, fw-2, 10);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(x+w, fy+4, fw-6, 6);
      }
      // Fire on the ground in front
      for (let i=0;i<5;i++) {
        const gx = x - 8 + i*(w+16)/5;
        const gh = 6 + Math.sin(frame*0.2+i*1.5)*3;
        ctx.fillStyle = '#cc2200';
        ctx.fillRect(gx, y+h, 10, gh);
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(gx+2, y+h, 6, gh-2);
      }
      // Thick smoke columns
      ctx.fillStyle = 'rgba(40,40,40,0.3)';
      for (let i=0;i<5;i++) {
        const sy = y-30-i*12-Math.sin(frame*0.025+i)*8;
        const sx = x+w/2-10+Math.sin(frame*0.035+i*2.5)*12;
        ctx.beginPath();
        ctx.arc(sx+8, sy, 10+i*4, 0, Math.PI*2);
        ctx.fill();
      }
      // Lots of ember particles flying up
      ctx.fillStyle = '#ff8800';
      for (let i=0;i<12;i++) {
        const ex = x-10+Math.sin(frame*0.06+i*2.7)*(w/2+20)+w/2+10;
        const ey = y-8-((frame*0.9+i*15)%70);
        ctx.fillRect(ex, ey, 2, 2);
      }
      ctx.fillStyle = '#ffcc44';
      for (let i=0;i<8;i++) {
        const ex = x+Math.sin(frame*0.08+i*3.1)*w/2+w/2;
        const ey = y-5-((frame*1.2+i*12)%55);
        ctx.fillRect(ex, ey, 1, 1);
      }
      // Scorch marks on ground
      ctx.fillStyle = 'rgba(30,10,0,0.35)';
      ctx.fillRect(x-10, y+h+6, w+20, 8);
      // Open doorway (glowing from fire inside)
      const dy2 = doorAtTop ? y-4 : y+h-12;
      ctx.fillStyle = '#1a0800';
      ctx.fillRect(x+w/2-8, dy2, 16, 16);
      ctx.fillStyle = '#331100';
      ctx.fillRect(x+w/2-6, dy2+2, 12, 12);
      // Firelight glow from inside
      ctx.fillStyle = 'rgba(255,100,0,0.3)';
      ctx.fillRect(x+w/2-6, dy2+2, 12, 12);
      // Metal frame
      ctx.fillStyle = '#666';
      ctx.fillRect(x+w/2-9, dy2, 2, 16);
      ctx.fillRect(x+w/2+7, dy2, 2, 16);
      ctx.fillRect(x+w/2-9, dy2, 18, 2);
      break;
    }

    case 'stairs': {
      // STAIR FALLS: The entire building IS stairs - stair-shaped silhouette
      // Everything is diagonal steps

      const stepW = 10, stepH = 6;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(x+4, y+4, w+4, h+4);

      // === THE BUILDING ITSELF is stair-shaped ===
      // Left side: stair-stepped silhouette going up-right
      // The building outline is a staircase shape, not a rectangle
      const numBuildSteps = 10;
      for (let i=0;i<numBuildSteps;i++) {
        const sx = x + i * (w/numBuildSteps);
        const sy = y + h - (i+1) * (h/numBuildSteps);
        const sw = w - i * (w/numBuildSteps);
        const sh = (h/numBuildSteps);
        // Stone fill
        ctx.fillStyle = i%2===0 ? '#6b5b45' : '#63543f';
        ctx.fillRect(sx, sy, sw, sh+1);
        // Step edge (lighter top)
        ctx.fillStyle = '#c4a76c';
        ctx.fillRect(sx, sy, sw, 2);
        // Step front face (darker)
        ctx.fillStyle = '#5a4a38';
        ctx.fillRect(sx, sy+sh-1, w/numBuildSteps, 2);
      }

      // === FRONT: Grand staircase descending toward the player ===
      // Wide staircase coming out the front of the building
      const frontSteps = 8;
      const frontDir = doorAtTop ? -1 : 1; // stairs go toward door side
      const frontBaseY = doorAtTop ? y - 4 : y + h + 2;
      for (let i=0;i<frontSteps;i++) {
        const sw = w - 20 + i * 6; // gets wider as it descends
        const sx = x + w/2 - sw/2;
        const sy = frontBaseY + i * 7 * frontDir;
        // Step top surface
        ctx.fillStyle = '#d4b878';
        ctx.fillRect(sx, sy, sw, 4);
        // Step front edge
        ctx.fillStyle = '#b89a5a';
        ctx.fillRect(sx, sy + (frontDir > 0 ? 3 : -2), sw, 3);
        // Step shadow/depth
        ctx.fillStyle = '#a08848';
        ctx.fillRect(sx, sy + (frontDir > 0 ? 5 : -3), sw, 2);
      }

      // Railing posts along front staircase
      ctx.fillStyle = '#8a7a60';
      for (let i=0;i<frontSteps;i+=2) {
        const sw = w - 20 + i * 6;
        const sx = x + w/2 - sw/2;
        const sy = frontBaseY + i * 7 * frontDir;
        // Left post
        ctx.fillRect(sx-2, sy-8, 3, 12);
        // Right post
        ctx.fillRect(sx+sw-1, sy-8, 3, 12);
      }
      // Railing diagonal lines
      ctx.fillStyle = '#7a6a50';
      for (let i=0;i<frontSteps-1;i++) {
        const sw1 = w - 20 + i * 6;
        const sw2 = w - 20 + (i+1) * 6;
        const sy1 = frontBaseY + i * 7 * frontDir - 4;
        const sy2 = frontBaseY + (i+1) * 7 * frontDir - 4;
        // Left railing segments
        ctx.fillRect(x+w/2-sw1/2-1, sy1, 2, 8);
        // Right railing segments
        ctx.fillRect(x+w/2+sw1/2, sy1, 2, 8);
      }

      // === ROOF: Stair-stepped top going even higher ===
      for (let i=0;i<6;i++) {
        const rw = w - 10 - i*10;
        if (rw < 8) break;
        const rx = x + 4 + i*5;
        const ry = y - 6 - i*8;
        ctx.fillStyle = '#c4a76c';
        ctx.fillRect(rx, ry, rw, 4);
        ctx.fillStyle = '#b89a5a';
        ctx.fillRect(rx, ry+3, rw, 2);
        ctx.fillStyle = '#5a4a38';
        ctx.fillRect(rx, ry+5, 2, 3);
      }

      // === Small diagonal staircase patterns ON the facade ===
      // Left diagonal going up-right
      for (let i=0;i<5;i++) {
        ctx.fillStyle = '#c4a76c';
        ctx.fillRect(x+4+i*8, y+h-10-i*8, 8, 3);
        ctx.fillStyle = '#a89060';
        ctx.fillRect(x+4+i*8, y+h-8-i*8, 8, 2);
      }
      // Right diagonal going up-left
      for (let i=0;i<4;i++) {
        ctx.fillStyle = '#d4b878';
        ctx.fillRect(x+w-12-i*8, y+h-14-i*7, 8, 3);
        ctx.fillStyle = '#bfa668';
        ctx.fillRect(x+w-12-i*8, y+h-12-i*7, 8, 2);
      }

      // Crash pad at bottom of front stairs
      const padY = frontBaseY + (frontSteps-1)*7*frontDir + (frontDir>0?8:-8);
      ctx.fillStyle = '#4466aa';
      ctx.fillRect(x+4, padY, w-8, 5);
      ctx.fillStyle = '#5577bb';
      ctx.fillRect(x+6, padY+1, w-12, 3);

      // Caution tape
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(x-2, y+h-1, w+4, 2);
      ctx.fillStyle = '#222';
      for (let i=0;i<8;i++) ctx.fillRect(x-2+i*6, y+h-1, 3, 2);

      // Open doorway at top of front stairs
      const dy3 = doorAtTop ? y-4 : y+h-10;
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(x+w/2-8, dy3, 16, 14);
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(x+w/2-6, dy3+2, 12, 10);
      ctx.fillStyle = '#6b5530';
      ctx.fillRect(x+w/2-9, dy3, 2, 14);
      ctx.fillRect(x+w/2+7, dy3, 2, 14);
      ctx.fillRect(x+w/2-9, dy3, 18, 2);
      break;
    }

    case 'office': {
      // STUNT COORDINATOR: Grey/red building wearing sunglasses (overhead view)
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x+4, y+4, w, h);

      // Main building body (grey)
      ctx.fillStyle = '#707070';
      ctx.fillRect(x, y, w, h);
      // Lighter top section
      ctx.fillStyle = '#808080';
      ctx.fillRect(x+2, y+2, w-4, h/2);
      // Red accent stripe across the middle
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(x, y+h/2-3, w, 8);
      ctx.fillStyle = '#aa1818';
      ctx.fillRect(x, y+h/2+3, w, 2);
      // Red roof trim
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(x-2, y-4, w+4, 6);
      ctx.fillRect(x-2, y+h-2, w+4, 4);

      // === BIG SUNGLASSES (overhead, spanning the top of building) ===
      const glassY = y + 8;
      const glassH = 20;
      const glassW = 18;
      const bridge = 6;
      // Left lens
      ctx.fillStyle = '#111';
      ctx.fillRect(x+4, glassY, glassW, glassH);
      // Right lens
      ctx.fillRect(x+w-4-glassW, glassY, glassW, glassH);
      // Lens frames (dark red)
      ctx.fillStyle = '#881111';
      ctx.fillRect(x+2, glassY-2, glassW+4, 2); // top left
      ctx.fillRect(x+2, glassY+glassH, glassW+4, 2); // bottom left
      ctx.fillRect(x+2, glassY-2, 2, glassH+4); // left side left
      ctx.fillRect(x+4+glassW, glassY-2, 2, glassH+4); // right side left
      ctx.fillRect(x+w-6-glassW, glassY-2, glassW+4, 2); // top right
      ctx.fillRect(x+w-6-glassW, glassY+glassH, glassW+4, 2); // bottom right
      ctx.fillRect(x+w-6-glassW, glassY-2, 2, glassH+4); // left side right
      ctx.fillRect(x+w-4, glassY-2, 2, glassH+4); // right side right
      // Bridge between lenses
      ctx.fillStyle = '#881111';
      ctx.fillRect(x+4+glassW, glassY+glassH/2-2, w-8-glassW*2, 4);
      // Lens shine/reflection
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(x+6, glassY+3, 6, 4);
      ctx.fillRect(x+w-2-glassW, glassY+3, 6, 4);
      // Arms extending to sides
      ctx.fillStyle = '#881111';
      ctx.fillRect(x-8, glassY+glassH/2-1, 12, 3);
      ctx.fillRect(x+w-4, glassY+glassH/2-1, 12, 3);

      // Red star badge below glasses
      ctx.fillStyle = '#ffdb58';
      const bx = x+w/2, by = y+h-18;
      ctx.fillRect(bx-5, by, 10, 10);
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(bx-3, by+2, 6, 6);
      ctx.fillStyle = '#ffdb58';
      ctx.fillRect(bx-1, by+1, 2, 8);
      ctx.fillRect(bx-3, by+4, 6, 2);

      // Open doorway
      const dy4 = doorAtTop ? y-6 : y+h-2;
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(x+w/2-8, dy4, 16, 14);
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(x+w/2-6, dy4+2, 12, 10);
      ctx.fillStyle = '#666';
      ctx.fillRect(x+w/2-9, dy4, 2, 14);
      ctx.fillRect(x+w/2+7, dy4, 2, 14);
      ctx.fillRect(x+w/2-9, dy4, 18, 2);
      break;
    }
  }

  // Sign (below for top-facing buildings, above for bottom-facing)
  const signY = doorAtTop ? y+h+16 : y-32;
  const signW = Math.max(w+20, 70);
  const signX = x+w/2-signW/2;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(signX, signY, signW, 20);
  // Sign border
  ctx.fillStyle = b.accent;
  ctx.fillRect(signX, signY, signW, 2);
  ctx.fillRect(signX, signY+18, signW, 2);
  ctx.fillRect(signX, signY, 2, 20);
  ctx.fillRect(signX+signW-2, signY, 2, 20);
  // Text
  ctx.fillStyle = b.accent;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, x+w/2, signY+14);
}

function drawPlayer() {
  const x = Math.floor(player.x), y = Math.floor(player.y);
  const bobY = player.moving ? Math.sin(frame*0.3)*2 : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(x+10, y+23, 8, 3, 0, 0, Math.PI*2);

  // Body (red stunt suit)
  ctx.fillStyle = '#e04040';

  ctx.fillRect(x+12, y+22+bobY, 5, 3);
}

  // Auto-navigate when walking through the open door
  for (const b of buildings) {
    const bx = b.doorX*TILE, by = b.doorY*TILE;
    const dist = Math.hypot(player.x+10-bx, player.y+12-by);
    if (dist < 12 && !enteringBuilding) {
      // Freeze controls and navigate
      enteringBuilding = true;
      // Save which building for return spawn
      const tagMap = {'STAIR FALLS':'stairfalls','FIRE BURNS':'fireburns','HIGH FALLS':'highfalls','STUNT COORD':'stuntcoord'};
      localStorage.setItem('stuntschool_lastbuilding', tagMap[b.name] || '');
      // Small delay so player visually disappears into the door
      setTimeout(() => {
        window.location.href = b.url;
      }, 300);
      return;
    }
    if (dist < 48) {
      nearBuilding = b;
      ep.style.display = 'block';
      ep.textContent = b.name;
      return;
    }
  }
  ep.style.display = 'none';
  nearBuilding = null;

  for (const npc of npcs) {
    const dist = Math.hypot(player.x+10-(npc.x+12), player.y+12-(npc.y+14));
    if (dist < 44) { nearNPC = npc; return; }
  }
}

// ---- UPDATE ----
function update() {
  if (!gameStarted || dialogueActive || enteringBuilding) return;
  player.moving = false;
  let dx = 0, dy = 0;

  // Keyboard
  if (keys['ArrowLeft']||keys['a']||keys['A']) { dx=-player.speed; player.dir=1; }
  if (keys['ArrowRight']||keys['d']||keys['D']) { dx=player.speed; player.dir=2; }
  if (keys['ArrowUp']||keys['w']||keys['W']) { dy=-player.speed; player.dir=3; }
  if (keys['ArrowDown']||keys['s']||keys['S']) { dy=player.speed; player.dir=0; }

  // Touch joystick (omnidirectional, constant speed)
  if (joystick.active) {
    const deadzone = 0.15;
    const jmag = Math.sqrt(joystick.x*joystick.x + joystick.y*joystick.y);
    if (jmag > deadzone) {
      // Normalize to constant speed regardless of joystick distance
      dx += (joystick.x / jmag) * player.speed;
      dy += (joystick.y / jmag) * player.speed;
      // Set facing direction based on dominant axis
      if (Math.abs(joystick.x) > Math.abs(joystick.y)) {
        player.dir = joystick.x < 0 ? 1 : 2;
      } else {
        player.dir = joystick.y < 0 ? 3 : 0;
      }
    }
  }

  if (dx!==0||dy!==0) player.moving = true;
  // Clamp diagonal speed
  const mag = Math.sqrt(dx*dx+dy*dy);
  if (mag > player.speed) { dx = dx/mag*player.speed; dy = dy/mag*player.speed; }

  if (dx!==0 && !isBlocked(player.x+dx,player.y,player.w,player.h)) player.x+=dx;
  if (dy!==0 && !isBlocked(player.x,player.y+dy,player.w,player.h)) player.y+=dy;

  if (player.moving) {
    player.animTimer++;
    if (player.animTimer>6) { player.animFrame++; player.animTimer=0; }
  }
  checkProximity();
}

// ---- DRAW ----
const ZOOM = 2;
function draw() {
  ctx.clearRect(0,0,W,H);

  // Camera follows player, clamped to map edges
  const camX = Math.max(0, Math.min(player.x + 10 - W/(2*ZOOM), MAP_W*TILE - W/ZOOM));
  const camY = Math.max(0, Math.min(player.y + 12 - H/(2*ZOOM), MAP_H*TILE - H/ZOOM));

  ctx.save();
  ctx.scale(ZOOM, ZOOM);
  ctx.translate(-camX, -camY);

  for (let y=0;y<MAP_H;y++) for (let x=0;x<MAP_W;x++) drawTile(x,y);
  decorations.forEach(d => drawDecoration(d));

  const entities = [];
  buildings.forEach(b => entities.push({type:'building',data:b,y:(b.y+b.h)*TILE}));
  npcs.forEach(n => entities.push({type:'npc',data:n,y:n.y+28}));
  entities.push({type:'player',data:player,y:player.y+24});
  entities.sort((a,b) => a.y-b.y);

  entities.forEach(e => {
    switch(e.type) {
      case 'building': drawBuilding(e.data); break;
      case 'npc': drawNPC(e.data); break;
      case 'player': drawPlayer(); break;
    }
  });

  ctx.restore();

  // Vignette (drawn in screen space)
  const g = ctx.createRadialGradient(W/2,H/2,W*0.35,W/2,H/2,W*0.75);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function gameLoop() {
  frame++;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
